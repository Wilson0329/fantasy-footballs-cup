<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Footballs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --surface2:  #1a2236;
      --border:    #1f2d45;
      --accent:    #00d4aa;
      --accent2:   #6366f1;
      --gold:      #f59e0b;
      --red:       #ef4444;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --win:       #16a34a;
      --lose:      #dc2626;
      --draw:      #ca8a04;
      --pos:       #22c55e;
      --neg:       #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1.5rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(99,102,241,0.25) 0%, transparent 60%);
      pointer-events: none;
    }
    .trophy { font-size: 2rem; margin-bottom: 0.4rem; }
    .site-header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #a5b4fc, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }
    .season-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #a5b4fc;
      font-weight: 500;
    }
    .last-updated { font-size: 0.72rem; color: var(--muted); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 1rem;
      position: relative;
      z-index: 1;
    }
    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.2px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Groups ── */
    .groups-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 900px) { .groups-grid { grid-template-columns: 1fr; } }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .group-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .group-badge {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent2);
      color: white;
      font-weight: 800;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .group-header h2 { font-size: 1rem; font-weight: 700; }

    /* ── Standings Table (cup) ── */
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .standings-table thead th {
      padding: 0.5rem 0.75rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .standings-table thead th:first-child { text-align: left; }
    .standings-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .standings-table tbody tr:last-child { border-bottom: none; }
    .standings-table tbody tr:hover { background: var(--surface2); }
    .standings-table td {
      padding: 0.6rem 0.75rem;
      text-align: center;
      color: var(--text);
    }
    .standings-table td:first-child { text-align: left; }
    .pos-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .pos-num { font-weight: 700; width: 1.2rem; text-align: right; color: var(--muted); }
    .team-name { font-weight: 600; }
    .manager-name { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    .qualified-pill {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 170, 0.3);
      white-space: nowrap;
    }
    .pts-cell { font-weight: 700; font-size: 1rem; color: var(--text); }
    .separator-row td { background: rgba(0,0,0,0.3); padding: 2px 0; }

    /* ── Fixtures ── */
    .fixtures-accordion { border-top: 1px solid var(--border); }
    .round-toggle {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .round-toggle:hover { background: var(--surface2); }
    .round-info { display: flex; align-items: center; gap: 0.5rem; }
    .round-gw {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .chevron { transition: transform 0.2s; color: var(--muted); }
    .chevron.open { transform: rotate(180deg); }
    .round-matches { display: none; }
    .round-matches.open { display: block; }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      gap: 0.5rem;
    }
    .match-row:last-child { border-bottom: none; }
    .match-team { flex: 1; }
    .match-team.home { text-align: right; font-weight: 600; }
    .match-team.away { text-align: left;  font-weight: 600; }
    .match-score {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 80px;
      justify-content: center;
    }
    .score-box {
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 2.2rem;
      text-align: center;
    }
    .score-box.win      { background: rgba(22,163,74,0.2);  color: #4ade80; }
    .score-box.lose     { background: rgba(220,38,38,0.2);  color: #f87171; }
    .score-box.draw     { background: rgba(202,138,4,0.2);  color: #fbbf24; }
    .score-box.upcoming { background: var(--surface2); color: var(--muted); }
    .vs-sep { color: var(--muted); font-size: 0.75rem; }

    /* ── Semi-finals ── */
    .semis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { .semis-grid { grid-template-columns: 1fr; } }
    .sf-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .sf-header {
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent2);
    }
    .sf-matchup {
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: space-between;
    }
    .sf-team { flex: 1; }
    .sf-team-name { font-weight: 700; font-size: 0.9rem; }
    .sf-team-name.winner { color: var(--accent); }
    .sf-manager { font-size: 0.72rem; color: var(--muted); }
    .sf-vs { color: var(--muted); font-size: 0.75rem; font-weight: 600; }
    .sf-agg { display: flex; align-items: center; gap: 0.5rem; justify-content: center; padding: 0.5rem 0; }
    .agg-score { font-size: 1.6rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 8px; }
    .agg-score.winner { background: rgba(0,212,170,0.1); color: var(--accent); }
    .agg-score.loser  { background: rgba(0,0,0,0.3); color: var(--muted); }
    .agg-dash { color: var(--muted); font-size: 1.2rem; }
    .sf-legs { border-top: 1px solid var(--border); }
    .sf-leg {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .sf-leg:last-child { border-bottom: none; }
    .sf-leg-label { color: var(--muted); font-weight: 600; font-size: 0.72rem; }
    .sf-leg-scores { display: flex; align-items: center; gap: 0.5rem; }
    .leg-score { font-weight: 700; font-size: 0.9rem; }
    .leg-score.win  { color: #4ade80; }
    .leg-score.lose { color: #f87171; }
    .sf-winner-banner {
      padding: 0.6rem 1rem;
      background: rgba(0,212,170,0.08);
      border-top: 1px solid rgba(0,212,170,0.2);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    /* ── Final Hero ── */
    .final-hero {
      background: linear-gradient(160deg, #0f0c1a 0%, #1a1035 40%, #0d1a0f 100%);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      padding: 2.5rem 1.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .final-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(245,158,11,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .final-hero-label { text-align: center; font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; opacity: 0.8; }
    .final-hero-gw { text-align: center; font-size: 0.72rem; color: var(--muted); margin-bottom: 2rem; }
    .final-hero-matchup { display: flex; align-items: center; justify-content: center; gap: 1rem; max-width: 700px; margin: 0 auto; }
    .final-hero-team { flex: 1; text-align: center; }
    .final-hero-team-name { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 800; line-height: 1.2; color: var(--text); }
    .final-hero-team-name.winner { color: var(--gold); }
    .final-hero-manager { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
    .final-hero-vs { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; flex-shrink: 0; padding: 0 0.5rem; }
    .final-hero-scores { display: flex; align-items: center; gap: 0.5rem; }
    .final-hero-score { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 800; min-width: 2.5rem; text-align: center; color: var(--muted); }
    .final-hero-score.winner { color: var(--gold); }
    .final-hero-dash { color: var(--muted); font-size: 1.5rem; font-weight: 300; }
    .final-hero-upcoming { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .final-hero-q { font-size: 3rem; font-weight: 800; color: rgba(245,158,11,0.25); }
    .final-hero-upcoming-label { font-size: 0.72rem; font-weight: 600; color: rgba(245,158,11,0.6); letter-spacing: 1px; text-transform: uppercase; }
    .final-hero-banner { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: rgba(245,158,11,0.7); font-weight: 500; }
    .final-hero-banner.champion { font-size: 1rem; font-weight: 700; color: var(--gold); }

    /* ── League table ── */
    .league-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .league-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .league-table thead th {
      padding: 0.6rem 1rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .league-table thead th:nth-child(2) { text-align: left; }
    .league-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .league-table tbody tr:last-child { border-bottom: none; }
    .league-table tbody tr:hover { background: var(--surface2); }
    .league-table td { padding: 0.65rem 1rem; text-align: center; }
    .league-table td:nth-child(2) { text-align: left; }
    .rank-cell { font-weight: 700; color: var(--muted); font-size: 0.9rem; }
    .rank-move { font-size: 0.65rem; font-weight: 700; margin-left: 2px; }
    .rank-move.up   { color: #4ade80; }
    .rank-move.down { color: #f87171; }
    .rank-move.same { color: var(--muted); }
    .league-total { font-weight: 800; font-size: 1.05rem; color: var(--text); }
    .league-gw { font-weight: 600; color: var(--accent); }

    /* ── Stats tables (trade diff + captain pts) ── */
    .stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .stats-card-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .stats-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .stats-card-header p { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .stats-table thead th {
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .stats-table thead th:nth-child(2) { text-align: left; }
    .stats-table tbody tr.summary-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .stats-table tbody tr.summary-row:hover { background: var(--surface2); }
    .stats-table tbody tr.detail-row { border-bottom: 1px solid var(--border); }
    .stats-table tbody tr.detail-row:last-child { border-bottom: none; }
    .stats-table td { padding: 0.6rem 1rem; text-align: center; }
    .stats-table td:nth-child(2) { text-align: left; }

    .net-gain { font-weight: 800; font-size: 1rem; }
    .net-gain.pos { color: #4ade80; }
    .net-gain.neg { color: #f87171; }
    .net-gain.zero { color: var(--muted); }

    .expand-btn {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }
    .expand-btn.open { transform: rotate(180deg); }

    /* GW selector bar */
    .gw-selector-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .gw-live-badge {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(239,68,68,0.3);
      letter-spacing: 0.03em;
    }
    .gw-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* Trade detail panel */
    .detail-panel {
      display: none;
      background: rgba(0,0,0,0.25);
    }
    .detail-panel.open { display: table-row-group; }
    .trade-detail-row td {
      padding: 0.45rem 1rem 0.45rem 2rem;
      font-size: 0.78rem;
      border-bottom: 1px solid rgba(31,45,69,0.5);
      text-align: left;
    }
    .trade-detail-row:last-child td { border-bottom: none; }
    .trade-player-out { color: #f87171; }
    .trade-player-in  { color: #4ade80; }
    .trade-diff { font-weight: 700; }
    .trade-diff.pos { color: #4ade80; }
    .trade-diff.neg { color: #f87171; }
    .trade-gw-label {
      display: inline-block;
      padding: 0.1rem 0.35rem;
      background: rgba(99,102,241,0.2);
      border-radius: 3px;
      font-size: 0.68rem;
      color: #a5b4fc;
      margin-right: 0.5rem;
      font-weight: 600;
    }

    /* Captain detail panel */
    .cap-detail-table { width: 100%; border-collapse: collapse; }
    .cap-detail-table td {
      padding: 0.4rem 1rem 0.4rem 2rem;
      font-size: 0.78rem;
      border-bottom: 1px solid rgba(31,45,69,0.5);
      color: var(--text);
    }
    .cap-detail-table td:not(:first-child) { text-align: center; }
    .cap-detail-table tr:last-child td { border-bottom: none; }
    .cap-bonus { font-weight: 700; color: var(--gold); }
    .cap-gw { font-size: 0.68rem; color: var(--muted); font-weight: 600; }
    .tc-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      background: rgba(245,158,11,0.2);
      color: var(--gold);
      border-radius: 3px;
      margin-left: 4px;
    }

    /* ── Champions tab ── */
    .champions-intro {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }
    .honour-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    .honour-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .honour-card.rank-1 { border-color: rgba(245,158,11,0.5); }
    .honour-card.rank-2 { border-color: rgba(148,163,184,0.4); }
    .honour-card.rank-3 { border-color: rgba(180,120,70,0.4); }
    .honour-card-top {
      padding: 1.1rem 1.25rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .honour-rank {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; flex-shrink: 0;
    }
    .honour-rank.r1 { background: rgba(245,158,11,0.2); color: var(--gold); }
    .honour-rank.r2 { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .honour-rank.r3 { background: rgba(180,120,70,0.15); color: #b47846; }
    .honour-rank.r4 { background: rgba(99,102,241,0.12); color: #818cf8; }
    .honour-manager { font-weight: 700; font-size: 0.95rem; }
    .honour-team { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    .honour-team.alumni { font-style: italic; }
    .honour-total {
      margin-left: auto;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--muted);
    }
    .honour-total.r1 { color: var(--gold); }
    .honour-trophies {
      padding: 0.6rem 1.25rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      border-top: 1px solid var(--border);
    }
    .trophy-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.73rem;

    }
    .trophy-pill.league {

    }
    .trophy-pill.cup {
      background: rgba(245,158,11,0.12);

    /* ── Champions sub-tables ── */
    .champions-sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 600px) { .champions-sub-grid { grid-template-columns: 1fr; } }
    .sub-table-card {

      font-weight: 700;
    }
    .sub-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .sub-table tr { border-bottom: 1px solid var(--border); }
    .sub-table tr:last-child { border-bottom: none; }
    .sub-table td { padding: 0.55rem 1rem; vertical-align: middle; }
    .sub-rank { color: var(--muted); font-weight: 700; font-size: 0.8rem; width: 1.5rem; }
    .sub-manager { font-weight: 600; }
    .sub-alumni { color: var(--muted); font-size: 0.72rem; font-weight: 400; }
    .sub-count { text-align: right; white-space: nowrap; }

    /* ── History tab ── */
    .history-founder {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;

    .founder-photo-wrap {
      flex-shrink: 0;

    }
    .founder-photo-wrap img {
      width: 100%;

    }
    .founder-content {
      padding: 1.75rem 1.75rem 1.75rem 0;
      flex: 1;
    }
    .founder-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }
    .founder-name {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a5b4fc, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
    }
    .founder-title {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .founder-quotes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .founder-quote {
      position: relative;
      padding: 0.85rem 1rem 0.85rem 1.25rem;

      border-left: 3px solid var(--accent2);

      font-size: 0.85rem;

      color: var(--text);
      font-style: italic;
    }
    .founder-quote::before {
      content: '"';
      position: absolute;
      top: -0.1rem;
      left: 0.3rem;
      font-size: 2.5rem;
      color: var(--accent2);
      opacity: 0.3;
      font-style: normal;
      line-height: 1;
    }
    .history-timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .timeline-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);

      letter-spacing: 1px;
    }
    .timeline-row {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      font-size: 0.85rem;
    }
    .timeline-row:last-child { border-bottom: none; }
    .timeline-season {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.78rem;
      min-width: 5.5rem;
    }
    .timeline-winner {
      flex: 1;
      font-weight: 600;
    }
    .timeline-trophy {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      font-weight: 600;
    }
    .timeline-trophy.league {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
    }
    .timeline-trophy.cup {
      background: rgba(245,158,11,0.12);
      color: var(--gold);
    }
    .founder-stats {
      display: flex;
      gap: 0;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .fstat {
      flex: 1;
      padding: 0.85rem 0.5rem;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .fstat:last-child { border-right: none; }
    .fstat-num {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a5b4fc, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fstat-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    @media (max-width: 600px) {
      .history-founder { flex-direction: column; gap: 0; }
      .founder-photo-wrap { width: 100%; }
      .founder-photo-wrap img { height: 260px; width: 100%; object-position: center 15%; }
      .founder-content { padding: 1.25rem; }
      .founder-name { font-size: 1.4rem; }

    /* ── Pitch view ── */
    .pitch-panel {
      display: none;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    .pitch-panel.open { display: block; }
    .pitch-loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .pitch-wrap {
      padding: 1rem 0.75rem 0.75rem;
    }
    .pitch-gw-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 4px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }

    .pitch-bg {
      background: linear-gradient(180deg, #14532d 0%, #166534 30%, #15803d 60%, #166534 80%, #14532d 100%);

      padding: 0.75rem 0.5rem;
      border: 2px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .pitch-bg::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }
    .pitch-row {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }
    .pitch-row:last-child { margin-bottom: 0; }
    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 58px;
      gap: 0.2rem;
    }
    .player-card:hover .player-shirt { transform: scale(1.08); }
    .player-shirt {
      width: 36px; height: 36px;
      border-radius: 6px;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      position: relative;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .player-shirt.gkp { background: #92400e; }
    .player-shirt.def { background: #1e3a5f; }
    .player-shirt.mid { background: #1e4d2b; }
    .player-shirt.fwd { background: #7c1d1d; }
    .player-shirt .cap-badge {
      position: absolute;
      top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      color: #000;
      font-size: 0.5rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .player-pts-badge {
      background: rgba(0,0,0,0.6);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      min-width: 22px;

    }
    .player-pts-badge.live { color: #4ade80; }
    .player-name-txt {
      font-size: 0.6rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-align: center;
      line-height: 1.2;

      overflow: hidden;

    }
    .bench-section {
      margin-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 0.5rem;
    }
    .bench-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .bench-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
    }
    /* Player stats drawer */
    .player-stats-drawer {
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      margin: 0.75rem 0.5rem 0;
      padding: 0.85rem 1rem;

    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .psd-header {

    .psd-name { font-weight: 700; font-size: 0.9rem; }

    .psd-stats-grid {

      grid-template-columns: repeat(3, 1fr);

    .psd-stat {

      border-radius: 6px;

    .psd-stat-num { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .psd-stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .psd-history {
      display: flex;
      gap: 0.3rem;
      align-items: flex-end;

    }
    .psd-gw-bar {
      display: flex;

    .psd-loading { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 0.5rem; }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      .container { padding: 1.25rem 0.75rem; }
      .site-header { padding: 1rem 0.75rem 0; }
      .tab-btn { padding: 0.65rem 0.75rem; font-size: 0.78rem; }

      /* Group standings: hide W/D/L on small screens */
      .standings-table .hide-mobile { display: none; }

<body>

<header class="site-header">
  <div class="trophy">🏆</div>
  <h1>Fantasy Footballs</h1>
  <div class="header-meta">
    <span class="season-badge" id="season-badge">2025/26</span>
    <span class="last-updated" id="last-updated"></span>
  </div>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="history">📜 History</button>
    <button class="tab-btn" data-tab="league">📊 League</button>
    <button class="tab-btn" data-tab="stats">📈 Stats</button>
    <button class="tab-btn" data-tab="cup">🏆 Cup</button>
    <button class="tab-btn" data-tab="champions">⭐ Champions</button>
  </nav>
</header>

<div id="final-hero-anchor"></div>
<main class="container" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    Loading…
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DOM helper
// ─────────────────────────────────────────────────────────────────────────────

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k === 'onClick') e.addEventListener('click', v);
    else if (k === 'innerHTML') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function scoreClass(score, opp) {
  if (score === null) return 'upcoming';
  if (score > opp) return 'win';
  if (score < opp) return 'lose';
  return 'draw';
}

function fmtDiff(n) {
  return (n >= 0 ? '+' : '') + n;
}

// ─────────────────────────────────────────────────────────────────────────────
// Cup tab builders
// ─────────────────────────────────────────────────────────────────────────────

function buildStandingsTable(standings) {
  const rows = standings.map((s, i) => {
    const posCell = el('div', { className: 'pos-cell' },
      el('span', { className: 'pos-num' }, String(s.position)),
      el('div', {},
        el('div', { className: 'team-name' },
          s.name,
          s.qualified ? el('span', { className: 'qualified-pill', style: 'margin-left:6px' }, 'Q') : null
        ),
        el('div', { className: 'manager-name' }, s.manager)
      )
    );
    return el('tr', {},
      el('td', {}, posCell),
      el('td', {}, String(s.played)),
      el('td', { className: 'hide-mobile' }, String(s.won)),
      el('td', { className: 'hide-mobile' }, String(s.drawn)),
      el('td', { className: 'hide-mobile' }, String(s.lost)),
      el('td', {}, String(s.points_for)),
      el('td', { className: 'pts-cell' }, String(s.cup_points))
    );
  });

  const tbody = el('tbody');
  rows.forEach((tr, i) => {
    tbody.appendChild(tr);
    if (i === 1) {
      tbody.appendChild(el('tr', { className: 'separator-row' },
        el('td', { colspan: '7', style: 'height:3px;background:rgba(0,212,170,0.15)' })
      ));
    }
  });

  return el('table', { className: 'standings-table' },
    el('thead', {}, el('tr', {},
      el('th', { style: 'text-align:left;padding-left:0.75rem' }, 'Team'),
      el('th', {}, 'P'),
      el('th', { className: 'hide-mobile' }, 'W'),
      el('th', { className: 'hide-mobile' }, 'D'),
      el('th', { className: 'hide-mobile' }, 'L'),
      el('th', {}, 'PF'), el('th', {}, 'Pts')
    )),
    tbody
  );
}

function buildFixtures(fixtures) {
  const accordion = el('div', { className: 'fixtures-accordion' });
  fixtures.forEach((round, ri) => {
    const isLast = ri === fixtures.length - 1;
    const matchesDiv = el('div', { className: 'round-matches' + (isLast ? ' open' : '') });
    const chevron = el('span', { className: 'chevron' + (isLast ? ' open' : '') }, '▾');
    const toggle = el('button', { className: 'round-toggle',
      onClick: () => { const o = matchesDiv.classList.toggle('open'); chevron.classList.toggle('open', o); }
    },
      el('span', { className: 'round-info' }, round.label, el('span', { className: 'round-gw' }, `GW${round.gw}`)),
      chevron
    );
    accordion.appendChild(toggle);
    round.matches.forEach(m => {
      const h = m.home, a = m.away;
      const upcoming = m.status === 'upcoming';
      const hClass = upcoming ? 'upcoming' : scoreClass(h.score, a.score);
      const aClass = upcoming ? 'upcoming' : scoreClass(a.score, h.score);
      const hWon = hClass === 'win', aWon = aClass === 'win';
      matchesDiv.appendChild(el('div', { className: 'match-row' },
        el('div', { className: 'match-team home' },
          el('div', { style: `font-weight:${hWon?'700':'500'};color:${hWon?'var(--text)':'var(--muted)'}` }, h.name)
        ),
        el('div', { className: 'match-score' },
          el('span', { className: `score-box ${hClass}` }, upcoming ? '—' : String(h.score)),
          el('span', { className: 'vs-sep' }, upcoming ? 'vs' : '-'),
          el('span', { className: `score-box ${aClass}` }, upcoming ? '—' : String(a.score))
        ),
        el('div', { className: 'match-team away' },
          el('div', { style: `font-weight:${aWon?'700':'500'};color:${aWon?'var(--text)':'var(--muted)'}` }, a.name)
        )
      ));
    });
    accordion.appendChild(matchesDiv);
  });
  return accordion;
}

function buildGroupCard(label, group) {
  return el('div', { className: 'group-card' },
    el('div', { className: 'group-header' },
      el('div', { className: 'group-badge' }, label),
      el('h2', {}, `Group ${label}`)
    ),
    buildStandingsTable(group.standings),
    buildFixtures(group.fixtures)
  );
}

function buildSFCard(sf) {
  const ta = sf.team_a, tb = sf.team_b;
  const winner = sf.winner;
  const aWon = winner && winner.entry_id === ta.entry_id;
  const bWon = winner && winner.entry_id === tb.entry_id;
  const allPlayed = sf.legs.every(l => l.status === 'complete');

  const legsDiv = el('div', { className: 'sf-legs' });
  sf.legs.forEach((leg, i) => {
    const upcoming = leg.status !== 'complete';
    const aC = upcoming ? '' : (leg.score_a > leg.score_b ? 'win' : leg.score_a < leg.score_b ? 'lose' : '');
    const bC = upcoming ? '' : (leg.score_b > leg.score_a ? 'win' : leg.score_b < leg.score_a ? 'lose' : '');
    legsDiv.appendChild(el('div', { className: 'sf-leg' },
      el('span', { className: 'sf-leg-label' }, `Leg ${i+1} · GW${leg.gw}`),
      el('div', { className: 'sf-leg-scores' },
        el('span', { className: `leg-score ${aC}` }, upcoming ? '—' : String(leg.score_a)),
        el('span', { style: 'color:var(--muted)' }, ' – '),
        el('span', { className: `leg-score ${bC}` }, upcoming ? '—' : String(leg.score_b))
      )
    ));
  });

  return el('div', { className: 'sf-card' },
    el('div', { className: 'sf-header' }, sf.label),
    el('div', { className: 'sf-matchup' },
      el('div', { className: 'sf-team', style: 'text-align:right' },
        el('div', { className: `sf-team-name${aWon ? ' winner' : ''}` }, ta.name),
        el('div', { className: 'sf-manager' }, ta.manager)
      ),
      el('span', { className: 'sf-vs' }, 'vs'),
      el('div', { className: 'sf-team' },
        el('div', { className: `sf-team-name${bWon ? ' winner' : ''}` }, tb.name),
        el('div', { className: 'sf-manager' }, tb.manager)
      )
    ),
    allPlayed ? el('div', { className: 'sf-agg' },
      el('span', { className: `agg-score ${aWon ? 'winner' : 'loser'}` }, String(sf.aggregate_a)),
      el('span', { className: 'agg-dash' }, '–'),
      el('span', { className: `agg-score ${bWon ? 'winner' : 'loser'}` }, String(sf.aggregate_b))
    ) : null,
    legsDiv,
    winner ? el('div', { className: 'sf-winner-banner' }, `🏅 ${winner.name} advance to the Final`) : null
  );
}

function buildFinalHero(final) {
  const ta = final.team_a, tb = final.team_b;
  const winner = final.winner;
  const aWon = winner && winner.entry_id === ta.entry_id;
  const bWon = winner && winner.entry_id === tb.entry_id;
  const upcoming = final.status !== 'complete';

  const vsArea = upcoming
    ? el('div', { className: 'final-hero-upcoming' },
        el('div', { className: 'final-hero-q' }, '?'),
        el('div', { className: 'final-hero-upcoming-label' }, `GW${final.gw}`)
      )
    : el('div', { className: 'final-hero-scores' },
        el('span', { className: `final-hero-score${aWon ? ' winner' : ''}` }, String(final.score_a)),
        el('span', { className: 'final-hero-dash' }, '–'),
        el('span', { className: `final-hero-score${bWon ? ' winner' : ''}` }, String(final.score_b))
      );

  const banner = upcoming
    ? el('div', { className: 'final-hero-banner' }, `⚽  Final kicks off Gameweek ${final.gw} — who lifts the trophy?`)
    : winner
      ? el('div', { className: 'final-hero-banner champion' }, `🏆  ${winner.name} are champions!`)
      : null;

  return el('div', { className: 'final-hero' },
    el('div', { className: 'final-hero-label' }, '🏆 Grand Final'),
    el('div', { className: 'final-hero-gw' }, `Gameweek ${final.gw}`),
    el('div', { className: 'final-hero-matchup' },
      el('div', { className: 'final-hero-team', style: 'text-align:right' },
        el('div', { className: `final-hero-team-name${aWon ? ' winner' : ''}` }, ta.name || 'TBD'),
        el('div', { className: 'final-hero-manager' }, ta.manager || '')
      ),
      el('div', { className: 'final-hero-vs' }, vsArea),
      el('div', { className: 'final-hero-team', style: 'text-align:left' },
        el('div', { className: `final-hero-team-name${bWon ? ' winner' : ''}` }, tb.name || 'TBD'),
        el('div', { className: 'final-hero-manager' }, tb.manager || '')
      )
    ),
    banner
  );
}

const WORKER_URL = 'https://fpl-proxy.josephpwilson3.workers.dev';
const LEAGUE_ID = 286779;

const _fplCache = {};
let _leagueStandings = null; // live standings from FPL API
let _bootstrap = null;
let _liveData = null;
let _liveGW = null;
let _liveInterval = null;

async function fetchFPL(path) {
  if (_fplCache[path]) return _fplCache[path];
  const url = `${WORKER_URL}/${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`FPL fetch failed: ${res.status}`);
  const data = await res.json();
  _fplCache[path] = data;
  return data;
}

async function getBootstrap() {
  if (_bootstrap) return _bootstrap;
  _bootstrap = await fetchFPL('bootstrap-static/');
  return _bootstrap;
}

async function getLive(gw) {
  // Always bust cache for live endpoint
  const url = `${WORKER_URL}/event/${gw}/live/?t=${Math.floor(Date.now()/60000)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Live fetch failed: ${res.status}`);
  return res.json();
}

async function getPicks(entryId, gw) {
  const key = `entry/${entryId}/event/${gw}/picks/`;
  // Bust cache per minute for picks too
  if (_fplCache[key] && _fplCache[key]._ts > Date.now() - 120000) return _fplCache[key];
  const url = `${WORKER_URL}/${key}?t=${Math.floor(Date.now()/120000)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Picks fetch failed: ${res.status}`);
  const data = await res.json();
  data._ts = Date.now();
  _fplCache[key] = data;
  return data;
}

async function getPlayerHistory(playerId) {
  const key = `element-summary/${playerId}/`;
  if (_fplCache[key]) return _fplCache[key];
  const data = await fetchFPL(key);
  _fplCache[key] = data;
  return data;
}

function updateLastPolled() {
  const span = document.getElementById('last-updated');
  if (!span) return;
  const t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const meta = ((_cupData || _leagueData || {}).metadata || {});
  const base = meta.last_updated ? `Data: ${meta.last_updated} · ` : '';
  span.textContent = `${base}FPL polled ${t}`;
}

async function getLeagueStandings() {
  // Returns map of entry_id -> { event_total, total, rank, last_rank }
  const data = await fetchFPL(`leagues-classic/${LEAGUE_ID}/standings/`);
  const map = {};
  (data.standings.results || []).forEach(r => {
    map[r.entry] = { gw_points: r.event_total, total_points: r.total, rank: r.rank, rank_last: r.last_rank };
  });
  return map;
}

function startLivePoll(gw) {
  if (_liveInterval) return;
  _liveGW = gw;
  _liveInterval = setInterval(async () => {
    try {
      _liveData = await getLive(gw);
      updateLastPolled();
      refreshOpenPitchViews();
      // Refresh league standing scores in table
      try {
        // Bust cache for standings
        delete _fplCache[`leagues-classic/${LEAGUE_ID}/standings/`];
        _leagueStandings = await getLeagueStandings();
        refreshLeagueScores();
      } catch(e2) { /* ignore standings poll error */ }
    } catch (e) { /* silently ignore poll errors */ }
  }, 60000);
}

function stopLivePoll() {
  if (_liveInterval) { clearInterval(_liveInterval); _liveInterval = null; }
}

const _openPitchRefresh = {};

function refreshOpenPitchViews() {
  Object.values(_openPitchRefresh).forEach(fn => fn());
}

function refreshLeagueScores() {
  if (!_leagueStandings) return;
  document.querySelectorAll('.league-table tbody').forEach(tbody => {
    const row = tbody.querySelector('tr[data-entry]');
    if (!row) return;
    const entryId = Number(row.dataset.entry);
    const live = _leagueStandings[entryId];
    if (!live) return;
    const gwCell = row.querySelector('.league-gw');
    const totalCell = row.querySelector('.league-total');
    if (gwCell) gwCell.textContent = String(live.gw_points);
    if (totalCell) totalCell.textContent = String(live.total_points);
  });
}

function posTypeClass(elementType) {
  return ['', 'gkp', 'def', 'mid', 'fwd'][elementType] || 'mid';
}

function buildPlayerCard(pick, playerMeta, livePoints, isActive) {
  const pts = livePoints != null ? livePoints : '—';
  const ptsClass = livePoints != null && _liveData ? 'live' : '';
  const posClass = posTypeClass(playerMeta ? playerMeta.element_type : 3);
  const shirt = el('div', { className: `player-shirt ${posClass}` }, '⚽');
  if (pick.is_captain) shirt.appendChild(el('span', { className: 'cap-badge' }, 'C'));
  else if (pick.is_vice_captain) shirt.appendChild(el('span', { className: 'cap-badge', style: 'background:#94a3b8' }, 'V'));

  const card = el('div', { className: 'player-card', 'data-player-id': String(pick.element) },
    shirt,
    el('div', { className: `player-pts-badge${ptsClass ? ' ' + ptsClass : ''}` }, String(pts)),
    el('div', { className: 'player-name-txt' }, playerMeta ? playerMeta.web_name : String(pick.element))
  );
  return card;
}

async function buildPitchView(entryId, gw, container, isLive) {
  container.innerHTML = '';
  container.appendChild(el('div', { className: 'pitch-loading' }, 'Loading squad...'));

  try {
    const [bs, picks, live] = await Promise.all([
      getBootstrap(),
      getPicks(entryId, gw),
      (_liveData && _liveGW === gw) ? Promise.resolve(_liveData) : getLive(gw),
    ]);

    if (live) { _liveData = live; _liveGW = gw; }

    const playerMap = {};
    bs.elements.forEach(p => { playerMap[p.id] = p; });

    const teamMap = {};
    bs.teams.forEach(t => { teamMap[t.id] = t; });

    const liveMap = {};
    if (live) live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });

    const starters = picks.picks.filter(p => p.position <= 11).sort((a, b) => a.position - b.position);
    const bench    = picks.picks.filter(p => p.position > 11).sort((a, b) => a.position - b.position);

    // Infer formation
    const rows = { 1: [], 2: [], 3: [], 4: [] };
    starters.forEach(p => {
      const et = playerMap[p.element] ? playerMap[p.element].element_type : 3;
      rows[et].push(p);
    });

    const gwLabel = isLive ? el('span', {}, el('span', { className: 'live-dot' }), 'Live GW' + gw) : el('span', {}, 'GW' + gw);
    const totalPts = starters.reduce((s, p) => {
      const raw = liveMap[p.element] || 0;
      const mult = picks.active_chip === 'bboost' ? 1 : (p.multiplier || 1);
      return s + raw * Math.min(mult, 2);
    }, 0);

    const wrap = el('div', { className: 'pitch-wrap' });
    wrap.appendChild(el('div', { className: 'pitch-gw-badge' },
      gwLabel,
      el('span', {}, `${picks.active_chip ? picks.active_chip.toUpperCase() + ' · ' : ''}${totalPts} pts`)
    ));

    const pitchBg = el('div', { className: 'pitch-bg' });
    let statsDrawer = null;

    function attachCardHandlers(cards) {
      cards.forEach(card => {
        card.addEventListener('click', async () => {
          const pid = Number(card.dataset.playerId);
          // Toggle: if same player clicked again, close
          if (statsDrawer && statsDrawer.dataset.pid === String(pid)) {
            statsDrawer.remove();
            statsDrawer = null;
            return;
          }
          if (statsDrawer) statsDrawer.remove();

          statsDrawer = el('div', { className: 'player-stats-drawer' });
          statsDrawer.dataset.pid = String(pid);
          const pm = playerMap[pid];

          const header = el('div', { className: 'psd-header' },
            el('span', { className: 'psd-name' }, pm ? `${pm.web_name} · ${teamMap[pm.team]?.short_name || ''}` : String(pid)),
            el('span', { className: 'psd-close', onClick: () => { statsDrawer.remove(); statsDrawer = null; } }, '✕')
          );
          statsDrawer.appendChild(header);
          statsDrawer.appendChild(el('div', { className: 'psd-loading' }, 'Loading stats...'));
          wrap.appendChild(statsDrawer);

          try {
            const summary = await getPlayerHistory(pid);
            const history = summary.history || [];
            const seasonTotal = history.reduce((s, h) => s + h.total_points, 0);
            const last5 = history.slice(-5);

            statsDrawer.innerHTML = '';
            statsDrawer.appendChild(header);

            const grid = el('div', { className: 'psd-stats-grid' },
              el('div', { className: 'psd-stat' },
                el('div', { className: 'psd-stat-num' }, String(seasonTotal)),
                el('div', { className: 'psd-stat-label' }, 'Season Pts')
              ),
              el('div', { className: 'psd-stat' },
                el('div', { className: 'psd-stat-num' }, pm ? `£${(pm.now_cost / 10).toFixed(1)}m` : '—'),
                el('div', { className: 'psd-stat-label' }, 'Price')
              ),
              el('div', { className: 'psd-stat' },
                el('div', { className: 'psd-stat-num' }, pm ? `${pm.selected_by_percent}%` : '—'),
                el('div', { className: 'psd-stat-label' }, 'Owned')
              )
            );
            statsDrawer.appendChild(grid);

            if (last5.length) {
              const maxPts = Math.max(...last5.map(h => h.total_points), 1);
              const histEl = el('div', { className: 'psd-history' });
              last5.forEach(h => {
                const barH = Math.max(4, Math.round((h.total_points / maxPts) * 48));
                histEl.appendChild(el('div', { className: 'psd-gw-bar' },
                  el('div', { className: 'psd-bar-pts' }, String(h.total_points)),
                  el('div', { className: 'psd-bar', style: `height:${barH}px` }),
                  el('div', { className: 'psd-bar-gw' }, `GW${h.round}`)
                ));
              });
              statsDrawer.appendChild(histEl);
            }
          } catch (e) {
            statsDrawer.querySelector('.psd-loading').textContent = 'Could not load stats.';
          }
        });
      });
    }

    // Render starting XI by position row
    [1, 2, 3, 4].forEach(et => {
      if (!rows[et].length) return;
      const row = el('div', { className: 'pitch-row' });
      rows[et].forEach(p => {
        row.appendChild(buildPlayerCard(p, playerMap[p.element], liveMap[p.element], isLive));
      });
      pitchBg.appendChild(row);
    });

    // Attach click handlers to all starting player cards
    attachCardHandlers(pitchBg.querySelectorAll ? [] : []);
    wrap.appendChild(pitchBg);

    // Bench
    const benchSection = el('div', { className: 'bench-section' });
    benchSection.appendChild(el('div', { className: 'bench-label' }, 'Bench'));
    const benchRow = el('div', { className: 'bench-row' });
    bench.forEach(p => benchRow.appendChild(buildPlayerCard(p, playerMap[p.element], liveMap[p.element], false)));
    benchSection.appendChild(benchRow);
    wrap.appendChild(benchSection);

    container.innerHTML = '';
    container.appendChild(wrap);

    // Attach handlers after DOM insertion
    container.querySelectorAll('.player-card').forEach(card => {
      card.addEventListener('click', async () => {
        const pid = Number(card.dataset.playerId);
        const existing = container.querySelector('.player-stats-drawer');
        if (existing && existing.dataset.pid === String(pid)) { existing.remove(); return; }
        if (existing) existing.remove();

        const pm = playerMap[pid];
        const drawerEl = el('div', { className: 'player-stats-drawer' });
        drawerEl.dataset.pid = String(pid);
        drawerEl.appendChild(el('div', { className: 'psd-header' },
          el('span', { className: 'psd-name' }, pm ? `${pm.web_name} · ${teamMap[pm.team]?.short_name || ''}` : String(pid)),
          el('span', { className: 'psd-close' }, '✕')
        ));
        drawerEl.appendChild(el('div', { className: 'psd-loading' }, 'Loading stats...'));
        drawerEl.querySelector('.psd-close').addEventListener('click', () => drawerEl.remove());
        container.querySelector('.pitch-wrap').appendChild(drawerEl);

        try {
          const summary = await getPlayerHistory(pid);
          const history = summary.history || [];
          const seasonTotal = history.reduce((s, h) => s + h.total_points, 0);
          const last5 = history.slice(-5);

          drawerEl.querySelector('.psd-loading').remove();
          const grid = el('div', { className: 'psd-stats-grid' },
            el('div', { className: 'psd-stat' }, el('div', { className: 'psd-stat-num' }, String(seasonTotal)), el('div', { className: 'psd-stat-label' }, 'Season Pts')),
            el('div', { className: 'psd-stat' }, el('div', { className: 'psd-stat-num' }, pm ? `\xA3${(pm.now_cost/10).toFixed(1)}m` : '—'), el('div', { className: 'psd-stat-label' }, 'Price')),
            el('div', { className: 'psd-stat' }, el('div', { className: 'psd-stat-num' }, pm ? `${pm.selected_by_percent}%` : '—'), el('div', { className: 'psd-stat-label' }, 'Owned'))
          );
          drawerEl.appendChild(grid);

          if (last5.length) {
            const maxPts = Math.max(...last5.map(h => h.total_points), 1);
            const histEl = el('div', { className: 'psd-history' });
            last5.forEach(h => {
              const barH = Math.max(4, Math.round((h.total_points / maxPts) * 48));
              histEl.appendChild(el('div', { className: 'psd-gw-bar' },
                el('div', { className: 'psd-bar-pts' }, String(h.total_points)),
                el('div', { className: 'psd-bar', style: `height:${barH}px` }),
                el('div', { className: 'psd-bar-gw' }, `GW${h.round}`)
              ));
            });
            drawerEl.appendChild(histEl);
          }
        } catch(e) {
          const l = drawerEl.querySelector('.psd-loading');
          if (l) l.textContent = 'Could not load stats.';
        }
      });
    });

    // Register for live refresh
    _openPitchRefresh[entryId] = async () => {
      if (!_liveData) return;
      _liveData.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });
      container.querySelectorAll('.player-card').forEach(card => {
        const pid = Number(card.dataset.playerId);
        const pBadge = card.querySelector('.player-pts-badge');
        if (pBadge && liveMap[pid] != null) {
          pBadge.textContent = String(liveMap[pid]);
          pBadge.classList.add('live');
        }
      });
    };

  } catch (e) {
    container.innerHTML = `<div class="pitch-loading">Could not load squad — ${e.message}</div>`;
  }
}

function buildLeagueTab(data) {
  const wrap = el('div');
  wrap.appendChild(el('div', { className: 'section-title' }, '📊 League Table'));

  const statusBar = el('div', { className: 'gw-selector-bar' },
    el('span', { className: 'gw-status-text' }, 'Loading FPL data...')
  );
  wrap.appendChild(statusBar);

  const tableWrap = el('div', { className: 'league-table-wrap' });
  wrap.appendChild(tableWrap);

  function buildStandingsTable(selectedGW, isLiveGW) {
    if (!data) return;
    tableWrap.innerHTML = '';
    const thead = el('thead', {},
      el('tr', {},
        el('th', {}, 'Rank'),
        el('th', {}, 'Team'),
        el('th', {}, 'GW'),
        el('th', {}, 'Total'),
        el('th', {}, '')
      )
    );
    const table = el('table', { className: 'league-table' }, thead);

    data.standings.forEach(s => {
      const delta = s.rank_last === 0 ? 0 : s.rank_last - s.rank;
      let moveEl;
      if (delta > 0)      moveEl = el('span', { className: 'rank-move up' }, ` ▲${delta}`);
      else if (delta < 0) moveEl = el('span', { className: 'rank-move down' }, ` ▼${Math.abs(delta)}`);
      else                moveEl = el('span', { className: 'rank-move same' }, ' —');

      const expandBtn = el('span', { className: 'expand-btn' }, '▾');
      const pitchPanelDiv = el('div', { className: 'pitch-panel', 'data-entry': String(s.entry_id) });
      const pitchRow = el('tr', {}, el('td', { colspan: '5', style: 'padding:0' }, pitchPanelDiv));

      const live = _leagueStandings && _leagueStandings[s.entry_id];
      const displayGW = live ? live.gw_points : s.gw_points;
      const displayTotal = live ? live.total_points : s.total_points;

      const summaryRow = el('tr', { style: 'cursor:pointer', 'data-entry': String(s.entry_id) },
        el('td', { className: 'rank-cell' }, String(s.rank), moveEl),
        el('td', {},
          el('div', { className: 'team-name' }, s.name),
          el('div', { className: 'manager-name' }, s.manager)
        ),
        el('td', { className: 'league-gw' }, String(displayGW)),
        el('td', { className: 'league-total' }, String(displayTotal)),
        el('td', {}, expandBtn)
      );

      let loaded = false;
      summaryRow.addEventListener('click', () => {
        const open = pitchPanelDiv.classList.toggle('open');
        expandBtn.classList.toggle('open', open);
        if (open && !loaded) {
          loaded = true;
          buildPitchView(s.entry_id, selectedGW, pitchPanelDiv, isLiveGW);
        }
        if (!open) delete _openPitchRefresh[s.entry_id];
      });

      const tbody = el('tbody');
      tbody.appendChild(summaryRow);
      tbody.appendChild(pitchRow);
      table.appendChild(tbody);
    });

    tableWrap.appendChild(table);
  }

  if (!data) {
    statusBar.innerHTML = '<span class="gw-status-text">League data not available — standings will load when league_data.json is generated.</span>';
  }

  (async () => {
    try {
      const [bs, liveStandings] = await Promise.all([
        getBootstrap(),
        getLeagueStandings().catch(() => null),
      ]);
      if (liveStandings) _leagueStandings = liveStandings;

      const events = bs.events;
      const liveEvent = events.find(e => e.is_current && !e.finished);
      const lastFinished = [...events].reverse().find(e => e.finished);
      let selectedGW = liveEvent ? liveEvent.id : (lastFinished ? lastFinished.id : null);
      const isLiveGW = !!liveEvent;

      if (!selectedGW) {
        statusBar.innerHTML = '<span class="gw-status-text">No gameweek data available.</span>';
        return;
      }

      _liveData = await getLive(selectedGW);
      _liveGW = selectedGW;
      updateLastPolled();
      if (isLiveGW) startLivePoll(selectedGW);

      const availableGWs = events.filter(e => e.finished || e.is_current).map(e => e.id).reverse();
      const gwSelect = el('select', { className: 'gw-select' });
      availableGWs.forEach(gw => {
        const opt = document.createElement('option');
        opt.value = String(gw);
        opt.textContent = `GW${gw}${(gw === selectedGW && isLiveGW) ? ' 🔴' : ''}`;
        if (gw === selectedGW) opt.selected = true;
        gwSelect.appendChild(opt);
      });

      statusBar.innerHTML = '';
      statusBar.appendChild(isLiveGW
        ? el('span', { className: 'gw-live-badge' }, '🔴 Live')
        : el('span', { className: 'gw-status-text' }, 'Showing:')
      );
      statusBar.appendChild(gwSelect);

      gwSelect.addEventListener('change', async () => {
        const newGW = Number(gwSelect.value);
        const newIsLive = !!(liveEvent && newGW === liveEvent.id);
        tableWrap.querySelectorAll('.pitch-panel.open').forEach(p => p.classList.remove('open'));
        tableWrap.querySelectorAll('.expand-btn.open').forEach(b => b.classList.remove('open'));
        Object.keys(_openPitchRefresh).forEach(k => delete _openPitchRefresh[k]);
        try {
          _liveData = await getLive(newGW);
          _liveGW = newGW;
          updateLastPolled();
        } catch(e) { _liveData = null; _liveGW = null; }
        buildStandingsTable(newGW, newIsLive);
      });

      buildStandingsTable(selectedGW, isLiveGW);

    } catch(e) {
      statusBar.innerHTML = `<span class="gw-status-text">Could not load FPL data: ${e.message}</span>`;
      if (data) {
        const fallbackGW = (_leagueData && _leagueData.metadata) ? _leagueData.metadata.current_gw : null;
        if (fallbackGW) buildStandingsTable(fallbackGW, false);
      }
    }
  })();

  return wrap;
}

      el('th', {}, '#'),
      el('th', {}, 'Manager'),

  );

      detailGroup.appendChild(noTradesRow);
    } else {
      team.trades.forEach(t => {
        const diff = t.differential;
        const diffStr = fmtDiff(diff);

        const row = document.createElement('tr');
        row.className = 'trade-detail-row';
        row.innerHTML = `<td colspan="5" style="padding:0.4rem 1rem 0.4rem 2rem;font-size:0.78rem;border-bottom:1px solid rgba(31,45,69,0.5)">
          <span class="trade-gw-label">GW${t.gw}</span>
          <span class="trade-player-out">${t.player_out.name}</span>
          <span style="color:var(--muted)"> → </span>
          <span class="trade-player-in">${t.player_in.name}</span>
          <span style="float:right;display:flex;gap:1.5rem;color:var(--muted)">
            <span>${t.player_out.pts_since}pts</span>
            <span>${t.player_in.pts_while_held}pts${t.player_in.still_in_squad ? '<span style="font-size:0.6rem;color:var(--accent);margin-left:2px">▪</span>' : ''}</span>
            <span class="trade-diff ${diffClass}" style="min-width:3rem;text-align:right">${diffStr}</span>
          </span>
        </td>`;
        detailGroup.appendChild(row);
      });
    }

    const expandBtn = el('span', { className: 'expand-btn' }, '▾');
    const summaryTbody = el('tbody');
    summaryTbody.appendChild(el('tr', { className: 'summary-row',
      onClick: () => {
        const open = detailGroup.classList.toggle('open');
        expandBtn.classList.toggle('open', open);
      }
    },
      el('td', { className: 'rank-cell' }, String(idx + 1)),
      el('td', {},
        el('div', { className: 'team-name' }, team.name),
        el('div', { className: 'manager-name' }, team.manager)
      ),
      el('td', { className: `net-gain ${gainClass}` }, fmtDiff(team.net_gain)),
      el('td', { style: 'color:var(--muted)' }, String(team.trades.length)),
      el('td', {}, expandBtn)
    ));

    table.appendChild(summaryTbody);
    table.appendChild(detailGroup);
  });

  card.appendChild(table);
  return card;
}

function buildCaptainTable(captainPoints) {
  const card = el('div', { className: 'stats-card' });
  card.appendChild(el('div', { className: 'stats-card-header' },
    el('h3', {}, '🎖️ Captain Points'),
    el('p', {}, 'Total bonus points earned from captaincy (raw captain score × 1, or ×2 for triple captain). Includes auto-promoted vice-captain.')
  ));

  const thead = el('thead', {},
    el('tr', {},
      el('th', {}, '#'),
      el('th', {}, 'Manager'),
      el('th', {}, 'Total Bonus'),
      el('th', {}, 'Best GW'),
      el('th', {}, '')
    )
  );

  const table2 = el('table', { className: 'stats-table' }, thead);

  captainPoints.forEach((team, idx) => {
    const bestGw = team.by_gw.reduce((best, g) => g.bonus > (best ? best.bonus : -1) ? g : best, null);

    const detailGroup = el('tbody', { className: 'detail-panel' });

    const dh = document.createElement('tr');
    dh.innerHTML = `<td colspan="5" style="padding:0.3rem 1rem 0.3rem 2rem;font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(31,45,69,0.5)">
      GW &nbsp;&nbsp; Captain &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Raw Pts &nbsp;&nbsp; Bonus
    </td>`;
    detailGroup.appendChild(dh);

    team.by_gw.forEach(g => {
      const tcBadge = g.multiplier === 3 ? '<span class="tc-badge">TC</span>' : '';
      const row = document.createElement('tr');
      row.innerHTML = `<td colspan="5" style="padding:0.4rem 1rem 0.4rem 2rem;font-size:0.78rem;border-bottom:1px solid rgba(31,45,69,0.5)">
        <span class="trade-gw-label">GW${g.gw}</span>
        ${g.player}${tcBadge}
        <span style="float:right;display:flex;gap:1.5rem">
          <span style="color:var(--muted)">${g.raw_pts}pts</span>
          <span class="cap-bonus" style="min-width:3rem;text-align:right">+${g.bonus}</span>
        </span>
      </td>`;
      detailGroup.appendChild(row);
    });

    const expandBtn = el('span', { className: 'expand-btn' }, '▾');
    const summaryTbody = el('tbody');
    summaryTbody.appendChild(el('tr', { className: 'summary-row',
      onClick: () => {
        const open = detailGroup.classList.toggle('open');
        expandBtn.classList.toggle('open', open);
      }
    },
      el('td', { className: 'rank-cell' }, String(idx + 1)),
      el('td', {},
        el('div', { className: 'team-name' }, team.name),
        el('div', { className: 'manager-name' }, team.manager)
      ),
      el('td', { style: 'font-weight:800;color:var(--gold);font-size:1rem' }, String(team.total_captain_bonus)),
      el('td', { style: 'color:var(--muted);font-size:0.8rem' },
        bestGw ? `GW${bestGw.gw} · ${bestGw.player} (+${bestGw.bonus})` : '—'
      ),
      el('td', {}, expandBtn)
    ));

    table2.appendChild(summaryTbody);
    table2.appendChild(detailGroup);
  });

  card.appendChild(table2);
  return card;
}

function buildStatsTab(data) {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', { className: 'section-title' }, '📈 League Stats'));
  frag.appendChild(buildTradeDiffTable(data.trade_differential));
  frag.appendChild(buildCaptainTable(data.captain_points));
  return frag;
}

// ─────────────────────────────────────────────────────────────────────────────
// Champions tab
// ─────────────────────────────────────────────────────────────────────────────

const CHAMPIONS_DATA = [
  { manager: 'Joe Wilson',    team: 'Forever20',            alumni: false, leagues: 4, cups: 1 },
  { manager: 'Jason Knightly', team: 'Inevitable',          alumni: false, leagues: 3, cups: 0 },
  { manager: 'Ed Pragnell',   team: 'Stay Classy SanDiogo', alumni: false, leagues: 1, cups: 2 },
  { manager: 'George Georgiou', team: 'GVG XI',             alumni: false, leagues: 1, cups: 2 },
  { manager: 'Alex Kalli',    team: 'Alumni',               alumni: true,  leagues: 1, cups: 1 },
  { manager: 'Ant Savides',   team: 'Alumni',               alumni: true,  leagues: 1, cups: 0 },
  { manager: 'Arun Quayum',   team: 'Habibi Jeebies',       alumni: false, leagues: 0, cups: 1 },
];

function buildChampionsTab() {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', { className: 'section-title' }, '⭐ Hall of Champions'));
  frag.appendChild(el('p', { className: 'champions-intro' }, 'All-time honour board — league titles and cup wins across every season.'));

  const sorted = [...CHAMPIONS_DATA].sort((a, b) => {
    const totalA = a.leagues + a.cups, totalB = b.leagues + b.cups;
    if (totalB !== totalA) return totalB - totalA;
    if (b.leagues !== a.leagues) return b.leagues - a.leagues;
    return b.cups - a.cups;
  });

  const board = el('div', { className: 'honour-board' });

  sorted.forEach((person, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `r${rank}` : 'r4';
    const cardClass = rank <= 3 ? ` rank-${rank}` : '';
    const total = person.leagues + person.cups;

    const trophies = el('div', { className: 'honour-trophies' });
    for (let l = 0; l < person.leagues; l++) {
      trophies.appendChild(el('span', { className: 'trophy-pill league' }, '🏆 League'));
    }
    for (let c = 0; c < person.cups; c++) {
      trophies.appendChild(el('span', { className: 'trophy-pill cup' }, '🥇 Cup'));
    }

    board.appendChild(el('div', { className: `honour-card${cardClass}` },
      el('div', { className: 'honour-card-top' },
        el('div', { className: `honour-rank ${rankClass}` }, String(rank)),
        el('div', {},
          el('div', { className: 'honour-manager' }, person.manager),
          el('div', { className: `honour-team${person.alumni ? ' alumni' : ''}` },
            person.alumni ? `${person.team} · Former member` : person.team
          )
        ),
        el('div', { className: `honour-total ${rankClass}` }, String(total))
      ),
      trophies
    ));
  });

  frag.appendChild(board);

  // Sub-tables
  const subGrid = el('div', { className: 'champions-sub-grid' });

  function buildSubTable(title, pill, pillClass, getValue) {
    const withWins = CHAMPIONS_DATA.filter(m => getValue(m) > 0)
      .sort((a, b) => getValue(b) - getValue(a));
    const card = el('div', { className: 'sub-table-card' });
    card.appendChild(el('div', { className: 'sub-table-header' }, title));
    const table = el('table', { className: 'sub-table' });
    withWins.forEach((person, i) => {
      const count = getValue(person);
      const tr = el('tr', {},
        el('td', { className: 'sub-rank' }, String(i + 1)),
        el('td', { className: 'sub-manager' },
          el('span', {}, person.manager),
          person.alumni ? el('span', { className: 'sub-alumni' }, ' · Former') : null
        ),
        el('td', { className: 'sub-count' },
          ...Array.from({ length: count }, () => el('span', { className: `trophy-pill ${pillClass}`, style: 'margin-left:3px' }, pill))
        )
      );
      table.appendChild(tr);
    });
    card.appendChild(table);
    return card;
  }

  subGrid.appendChild(buildSubTable('🏆 League Titles', '🏆', 'league', m => m.leagues));
  subGrid.appendChild(buildSubTable('🥇 Cup Wins', '🥇', 'cup', m => m.cups));
  frag.appendChild(subGrid);

  return frag;
}

// ─────────────────────────────────────────────────────────────────────────────
// History tab
// ─────────────────────────────────────────────────────────────────────────────

const FOUNDING_YEAR = 2012;
const TOTAL_SEASONS = new Date().getFullYear() - FOUNDING_YEAR + (new Date().getMonth() >= 7 ? 1 : 0);
const TOTAL_CUPS = CHAMPIONS_DATA.reduce((sum, m) => sum + m.cups, 0);

function buildHistoryTab() {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', { className: 'section-title' }, '📜 The History'));

  const founderCard = el('div', { className: 'history-founder' },
    el('div', { className: 'founder-photo-wrap' },
      el('img', { src: './george.jpg', alt: 'George Georgiou', loading: 'lazy' })
    ),
    el('div', { className: 'founder-content' },
      el('div', { className: 'founder-eyebrow' }, 'League Founder \xb7 Commissioner \xb7 Visionary'),
      el('div', { className: 'founder-name' }, 'George Georgiou'),
      el('div', { className: 'founder-title' }, 'GVG XI \xb7 Est. ' + FOUNDING_YEAR),
      el('div', { className: 'founder-quotes' },
        el('blockquote', { className: 'founder-quote' },
          "I founded this league in " + FOUNDING_YEAR + " with one simple vision: a fair, competitive " +
          "tournament that anyone could win. Turns out half the group didn't have a clue about football. " +
          "Having only won it once myself, I've learnt some hard lessons along the way. " +
          "There are plenty of life lessons buried in the infamous PPP system, for those brave enough to look. " +
          "I now have plans to take it global. Watch this space."
        )
      ),
      el('div', { className: 'founder-stats' },
        el('div', { className: 'fstat' },
          el('div', { className: 'fstat-num' }, String(FOUNDING_YEAR)),
          el('div', { className: 'fstat-label' }, 'Founded')
        ),
        el('div', { className: 'fstat' },
          el('div', { className: 'fstat-num' }, String(TOTAL_SEASONS)),
          el('div', { className: 'fstat-label' }, 'Seasons')
        ),
        el('div', { className: 'fstat' },
          el('div', { className: 'fstat-num' }, String(TOTAL_CUPS)),
          el('div', { className: 'fstat-label' }, 'Cups Played')
        )
      )
    )
  );
  frag.appendChild(founderCard);
  return frag;
}

// ─────────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────────

let _cupData = null, _leagueData = null;
let _activeTab = 'history';

function switchTab(tabName) {
  _activeTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.getElementById('final-hero-anchor').style.display = tabName === 'cup' ? '' : 'none';

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (tabName === 'cup') {
    if (_cupData) renderCup(_cupData);
    else app.appendChild(el('div', { className: 'not-available' }, 'Cup data not available.'));
  } else if (tabName === 'league') {
    app.appendChild(buildLeagueTab(_leagueData));
  } else if (tabName === 'stats') {
    if (_leagueData) app.appendChild(buildStatsTab(_leagueData));
    else app.appendChild(el('div', { className: 'not-available' }, 'Stats data not yet generated — run build_league_data.py'));
  } else if (tabName === 'champions') {
    app.appendChild(buildChampionsTab());
  } else if (tabName === 'history') {
    app.appendChild(buildHistoryTab());
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Cup render
// ─────────────────────────────────────────────────────────────────────────────

function renderCup(data) {
  const heroAnchor = document.getElementById('final-hero-anchor');
  heroAnchor.innerHTML = '';
  heroAnchor.appendChild(buildFinalHero(data.knockout.final));

  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(el('div', { className: 'section-title' }, '⚔️ Semi-Finals'));
  const semis = el('div', { className: 'semis-grid' });
  data.knockout.semi_finals.forEach(sf => semis.appendChild(buildSFCard(sf)));
  app.appendChild(semis);
  app.appendChild(el('div', { className: 'section-title', style: 'margin-top:1rem' }, '⚽ Group Stage'));
  app.appendChild(el('div', { className: 'groups-grid' },
    buildGroupCard('A', data.groups.A),
    buildGroupCard('B', data.groups.B)
  ));
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

Promise.all([
  fetch('./cup_data.json').then(r => r.json()).catch(() => null),
  fetch('./league_data.json').then(r => r.json()).catch(() => null),
]).then(([cupData, leagueData]) => {
  _cupData = cupData;
  _leagueData = leagueData;

  // Update header meta from whichever data is available
  const meta = (cupData || leagueData || {}).metadata || {};
  if (meta.season)    document.getElementById('season-badge').textContent = meta.season;
  if (meta.last_updated) document.getElementById('last-updated').textContent = `Updated: ${meta.last_updated} · GW${meta.current_gw}`;

  switchTab('history');
}).catch(err => {
  document.getElementById('app').innerHTML = `
    <div class="error-msg">
      <div style="font-size:2rem;margin-bottom:0.5rem">⚠️</div>
      <div>Could not load data.</div>
      <div style="font-size:0.8rem;margin-top:0.5rem;color:var(--muted)">${err.message}</div>
    </div>`;
});
</script>
</body>
