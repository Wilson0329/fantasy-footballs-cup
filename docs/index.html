function buildLeagueTab(data) {
  const wrap = el('div');
  wrap.appendChild(el('div', { className: 'section-title' }, icon('bar-chart-2'), ' League Table'));

  const statusBar = el('div', { className: 'gw-selector-bar' },
    el('span', { className: 'gw-status-text' }, 'Loading FPL data...')
  );
  wrap.appendChild(statusBar);

  const tableWrap = el('div', { className: 'league-table-wrap' });
  wrap.appendChild(tableWrap);

  function buildStandingsTable(selectedGW, isLiveGW, gwHistories) {
    if (!data) return;
    tableWrap.innerHTML = '';

    // Determine which GW the JSON data covers (the most recently finished one)
    const dataGW = data.metadata ? data.metadata.current_gw : null;
    const isCurrentDataGW = !selectedGW || selectedGW === dataGW || isLiveGW;

    const thead = el('thead', {},
      el('tr', {},
        el('th', {}, 'Rank'),
        el('th', {}, 'Team'),
        el('th', {}, selectedGW ? `GW${selectedGW}` : 'GW'),
        el('th', {}, 'Total'),
        el('th', {}, '')
      )
    );
    const table = el('table', { className: 'league-table' }, thead);

    // Sort by total points (live if available, else JSON)
    const standings = [...data.standings].sort((a, b) => {
      const liveA = _leagueStandings && _leagueStandings[a.entry_id];
      const liveB = _leagueStandings && _leagueStandings[b.entry_id];
      return (liveB ? liveB.total_points : b.total_points) - (liveA ? liveA.total_points : a.total_points);
    });

    standings.forEach((s, rank) => {
      const live = _leagueStandings && _leagueStandings[s.entry_id];
      const prevTotal = live ? live.total_points : s.total_points;
      const prevRank = s.rank_last || s.rank;
      const delta = prevRank === 0 ? 0 : prevRank - (rank + 1);
      let moveEl;
      if (delta > 0)      moveEl = el('span', { className: 'rank-move up' }, ` ▲${delta}`);
      else if (delta < 0) moveEl = el('span', { className: 'rank-move down' }, ` ▼${Math.abs(delta)}`);
      else                moveEl = el('span', { className: 'rank-move same' }, ' —');

      const expandBtn = el('span', { className: 'expand-btn' }, '▾');
      const pitchPanelDiv = el('div', { className: 'pitch-panel', 'data-entry': String(s.entry_id) });
      const pitchRow = el('tr', {}, el('td', { colspan: '5', style: 'padding:0' }, pitchPanelDiv));

      const displayGW = isCurrentDataGW
        ? (live ? live.gw_points : s.gw_points)
        : (gwHistories && gwHistories[s.entry_id] != null ? gwHistories[s.entry_id] : '—');
      const displayTotal = live ? live.total_points : s.total_points;

      const summaryRow = el('tr', { style: 'cursor:pointer', 'data-entry': String(s.entry_id) },
        el('td', { className: 'rank-cell' }, String(rank + 1), moveEl),
        el('td', {},
          el('div', { className: 'team-name' }, s.name),
          el('div', { className: 'manager-name' }, s.manager)
        ),
        el('td', { className: 'league-gw' }, String(displayGW)),
        el('td', { className: 'league-total' }, String(displayTotal)),
        el('td', {}, expandBtn)
      );

      let loaded = false;
      summaryRow.addEventListener('click', () => {
        const open = pitchPanelDiv.classList.toggle('open');
        expandBtn.classList.toggle('open', open);
        if (open && !loaded) {
          loaded = true;
          buildPitchView(s.entry_id, selectedGW, pitchPanelDiv, isLiveGW);
        }
        if (!open) delete _openPitchRefresh[s.entry_id];
      });

      const tbody = el('tbody');
      tbody.appendChild(summaryRow);
      tbody.appendChild(pitchRow);
      table.appendChild(tbody);
    });

    tableWrap.appendChild(table);
  }

  if (!data) {
    statusBar.innerHTML = '<span class="gw-status-text">League data not available — standings will load when league_data.json is generated.</span>';
  }

  (async () => {
    try {
      const [bs, liveStandings] = await Promise.all([
        getBootstrap(),
        getLeagueStandings().catch(() => null),
      ]);
      if (liveStandings) _leagueStandings = liveStandings;

      const events = bs.events;
      const liveEvent = events.find(e => e.is_current && !e.finished);
      const lastFinished = [...events].reverse().find(e => e.finished);
      let selectedGW = liveEvent ? liveEvent.id : (lastFinished ? lastFinished.id : null);
      const isLiveGW = !!liveEvent;

      if (!selectedGW) {
        statusBar.innerHTML = '<span class="gw-status-text">No gameweek data available.</span>';
        return;
      }

      _liveData = await getLive(selectedGW);
      _liveGW = selectedGW;
      updateLastPolled();
      if (isLiveGW) startLivePoll(selectedGW);

      const availableGWs = events.filter(e => e.finished || e.is_current).map(e => e.id).reverse();
      const gwSelect = el('select', { className: 'gw-select' });
      availableGWs.forEach(gw => {
        const opt = document.createElement('option');
        opt.value = String(gw);
        opt.textContent = `GW${gw}${(gw === selectedGW && isLiveGW) ? ' ●' : ''}`;
        if (gw === selectedGW) opt.selected = true;
        gwSelect.appendChild(opt);
      });

      statusBar.innerHTML = '';
      statusBar.appendChild(isLiveGW
        ? el('span', { className: 'gw-live-badge' }, icon('circle'), ' Live')
        : el('span', { className: 'gw-status-text' }, 'Showing:')
      );
      statusBar.appendChild(gwSelect);

      gwSelect.addEventListener('change', async () => {
        const newGW = Number(gwSelect.value);
        const newIsLive = !!(liveEvent && newGW === liveEvent.id);
        tableWrap.querySelectorAll('.pitch-panel.open').forEach(p => p.classList.remove('open'));
        tableWrap.querySelectorAll('.expand-btn.open').forEach(b => b.classList.remove('open'));
        Object.keys(_openPitchRefresh).forEach(k => delete _openPitchRefresh[k]);
        try {
          _liveData = await getLive(newGW);
          _liveGW = newGW;
          updateLastPolled();
        } catch(e) { _liveData = null; _liveGW = null; }

        // Fetch per-team GW points from history (cached after first load)
        const gwHistories = {};
        try {
          const entries = data.standings.map(s => s.entry_id);
          const histories = await Promise.all(entries.map(id => getTeamHistory(id)));
          entries.forEach((id, i) => {
            const gw = histories[i].find(h => h.event === newGW);
            if (gw) gwHistories[id] = gw.points;
          });
        } catch(e) { /* show — if history unavailable */ }

        buildStandingsTable(newGW, newIsLive, gwHistories);
      });

      buildStandingsTable(selectedGW, isLiveGW);

    } catch(e) {
      statusBar.innerHTML = `<span class="gw-status-text">Could not load FPL data: ${e.message}</span>`;
      if (data) {
        const fallbackGW = (_leagueData && _leagueData.metadata) ? _leagueData.metadata.current_gw : null;
        if (fallbackGW) buildStandingsTable(fallbackGW, false);
      }
    }
  })();

  return wrap;
}

function addTeamSelector(cardEl, getRows) {
  const bar = el('div', { className: 'stats-team-bar' });
  bar.appendChild(el('span', {}, 'Focus:'));
  const sel = el('select', { className: 'stats-team-select' });
  const allOpt = document.createElement('option');
  allOpt.value = '';
  allOpt.textContent = 'All managers';
  sel.appendChild(allOpt);
  // Populate options lazily once rows exist
  sel.addEventListener('focus', () => {
    if (sel.options.length > 1) return;
    getRows().forEach(tr => {
      const name = tr.dataset.manager;
      if (!name) return;
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
  });
  sel.addEventListener('change', () => {
    const val = sel.value;
    getRows().forEach(tr => {
      if (!val) { tr.classList.remove('highlighted', 'dimmed'); }
      else if (tr.dataset.manager === val) {
        tr.classList.add('highlighted');
        tr.classList.remove('dimmed');
        tr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        // auto-expand detail panel if present
        const btn = tr.querySelector('.expand-btn, .cap-expand-btn');
        const detail = tr.nextElementSibling;
        if (btn && detail && !detail.classList.contains('open')) btn.click();
      } else {
        tr.classList.add('dimmed');
        tr.classList.remove('highlighted');
      }
    });
  });
  bar.appendChild(sel);
  const insertBefore = cardEl.querySelector('.stats-table-scroll') || cardEl.querySelector('table');
  cardEl.insertBefore(bar, insertBefore);
}

    el('p', {}, '% of gameweeks where the named captain scored the most points in the starting XI.')
  ));
  const thead = el('thead', {},
    el('tr', {},
      el('th', {}, '#'),
      el('th', {}, 'Manager'),
      el('th', {}, 'Hits / GWs'),
      el('th', {}, 'Rate')
    )
  );
  const table = el('table', { className: 'stats-table' }, thead);
  const tbody = el('tbody');
  (hitRate || []).forEach((t, i) => {
    const pct = t.hit_rate;
    const barEl = el('div', { className: 'hit-bar-wrap' },
      el('div', { className: 'hit-bar-fill', style: `width:${pct}%` })
    );
    const row = el('tr', { className: 'summary-row', 'data-manager': t.manager },
      el('td', {}, String(i + 1)),
      el('td', {},
        el('div', { className: 'team-name' }, t.name),
        el('div', { className: 'manager-name' }, t.manager)
      ),
      el('td', {}, el('span', { className: 'stat-sub' }, `${t.captain_hits} / ${t.gws_played}`)),
      el('td', {},
        el('span', { className: 'stat-num-lg' }, `${pct}%`),
        barEl
      )
    );
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  { const s = el("div",{className:"stats-table-scroll"}); s.appendChild(table); card.appendChild(s); }
  addTeamSelector(card, () => Array.from(card.querySelectorAll('tr[data-manager]')));
  return card;
}

function buildStatsTab(data) {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', { className: 'section-title' }, icon('trending-up'), ' Stats'));
  frag.appendChild(buildTradeDiffTable(data.trade_differential));
  frag.appendChild(buildCaptainTable(data.captain_points));
  frag.appendChild(buildFormTable(data.form));
  frag.appendChild(buildBenchTable(data.bench_points));
  frag.appendChild(buildCaptainHitRateTable(data.captain_hit_rate));
  return frag;
}

const CHAMPIONS_DATA = [
  { manager: 'Joe Wilson',    team: 'Forever20',            alumni: false, leagues: 4, cups: 1 },
  { manager: 'Jason Knightly', team: 'Inevitable',          alumni: false, leagues: 3, cups: 0 },
  { manager: 'Ed Pragnell',   team: 'Stay Classy SanDiogo', alumni: false, leagues: 1, cups: 2 },
  { manager: 'George Georgiou', team: 'GVG XI',             alumni: false, leagues: 1, cups: 2 },
  { manager: 'Alex Kalli',    team: 'Alumni',               alumni: true,  leagues: 1, cups: 1 },
  { manager: 'Ant Savides',   team: 'Alumni',               alumni: true,  leagues: 1, cups: 0 },
  { manager: 'Arun Quayum',   team: 'Habibi Jeebies',       alumni: false, leagues: 0, cups: 1 },
];

function buildChampionsTab() {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', { className: 'section-title' }, icon('award'), ' Hall of Champions'));
  frag.appendChild(el('p', { className: 'champions-intro' }, 'All-time honour board — league titles and cup wins across every season.'));

  const sorted = [...CHAMPIONS_DATA].sort((a, b) => {
    const totalA = a.leagues + a.cups, totalB = b.leagues + b.cups;
    if (totalB !== totalA) return totalB - totalA;
    if (b.leagues !== a.leagues) return b.leagues - a.leagues;
    return b.cups - a.cups;
  });

  const board = el('div', { className: 'honour-board' });

  sorted.forEach((person, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `r${rank}` : 'r4';
    const cardClass = rank <= 3 ? ` rank-${rank}` : '';
    const total = person.leagues + person.cups;

    const trophies = el('div', { className: 'honour-trophies' });
    for (let l = 0; l < person.leagues; l++) {
      trophies.appendChild(el('span', { className: 'trophy-pill league' }, icon('trophy'), ' League'));
    }
    for (let c = 0; c < person.cups; c++) {
      trophies.appendChild(el('span', { className: 'trophy-pill cup' }, icon('trophy'), ' Cup'));
    }

    board.appendChild(el('div', { className: `honour-card${cardClass}` },
      el('div', { className: 'honour-card-top' },
        el('div', { className: `honour-rank ${rankClass}` }, String(rank)),
        el('div', {},
          el('div', { className: 'honour-manager' }, person.manager),
          el('div', { className: 'honour-team' }, person.team)
        ),
        el('div', { className: `honour-total ${rankClass}` }, String(total))
      ),
      trophies
    ));
  });

  frag.appendChild(board);

  // Sub-tables
  const subGrid = el('div', { className: 'champions-sub-grid' });

  function buildSubTable(title, pillClass, getValue) {
    const withWins = CHAMPIONS_DATA.filter(m => getValue(m) > 0)
      .sort((a, b) => getValue(b) - getValue(a));
    const card = el('div', { className: 'sub-table-card' });
    card.appendChild(el('div', { className: 'sub-table-header' }, title));
    const table = el('table', { className: 'sub-table' });
    withWins.forEach((person, i) => {
      const count = getValue(person);
      const pills = el('td', { className: 'sub-count' });
      for (let j = 0; j < count; j++) {
        const p = el('span', { className: `trophy-pill ${pillClass}`, style: 'margin-left:3px' });
        p.appendChild(icon('trophy'));
        pills.appendChild(p);
      }
      const tr = el('tr', {},
        el('td', { className: 'sub-rank' }, String(i + 1)),
        el('td', { className: 'sub-manager' },
          el('span', {}, person.manager)
        ),
        pills
      );
      table.appendChild(tr);
    });
    { const s = el("div",{className:"stats-table-scroll"}); s.appendChild(table); card.appendChild(s); }
    return card;
  }

  subGrid.appendChild(buildSubTable('League Titles', 'league', m => m.leagues));
  subGrid.appendChild(buildSubTable('Cup Wins', 'cup', m => m.cups));
  frag.appendChild(subGrid);

  return frag;
}

    ),

// ─────────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────────

let _cupData = null, _leagueData = null;
let _activeTab = 'league';

function switchTab(tabName) {
  _activeTab = tabName;
  if (tabName !== 'cup') stopCupLivePoll();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.getElementById('final-hero-anchor').style.display = tabName === 'cup' ? '' : 'none';

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (tabName === 'cup') {
    stopCupLivePoll();
    if (_cupData) {
      // Detect if current GW is a live cup gameweek
      (async () => {
        let cupLiveGW = null;
        try {
          const bs = _bootstrap || await getBootstrap();
          const liveEvent = bs.events.find(e => e.is_current && !e.finished);
          if (liveEvent) {
            // Check if this GW is in any cup fixture
            const cupGWs = new Set();
            ['A','B'].forEach(g => _cupData.groups[g].fixtures.forEach(f => cupGWs.add(f.gw)));
            _cupData.knockout.semi_finals.forEach(sf => sf.legs.forEach(l => cupGWs.add(l.gw)));
            if (_cupData.knockout.final.gw) cupGWs.add(_cupData.knockout.final.gw);
            getCupGWs().forEach(gw => cupGWs.add(gw));
            if (cupGWs.has(liveEvent.id)) cupLiveGW = liveEvent.id;
          }
        } catch(e) { /* ignore */ }
        renderCup(_cupData, cupLiveGW);
        if (cupLiveGW) startCupLivePoll(cupLiveGW);
      })();
    } else {
      app.appendChild(el('div', { className: 'not-available' }, 'Cup data not available.'));
    }
  } else if (tabName === 'league') {
    app.appendChild(buildLeagueTab(_leagueData));
  } else if (tabName === 'stats') {
    if (_leagueData) app.appendChild(buildStatsTab(_leagueData));
    else app.appendChild(el('div', { className: 'not-available' }, 'Stats data not yet generated — run build_league_data.py'));
  } else if (tabName === 'champions') {
    app.appendChild(buildChampionsTab());
  } else if (tabName === 'history') {
    app.appendChild(buildHistoryTab());
  }
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// ─────────────────────────────────────────────────────────────────────────────
// Cup render
// ─────────────────────────────────────────────────────────────────────────────

const DEFAULT_CUP_GWS = [18, 20, 22, 24, 26, 31, 33, 38];

function getCupGWs() {
  try {
    const s = JSON.parse(localStorage.getItem('cupSettings') || '{}');
    return Array.isArray(s.cupGWs) && s.cupGWs.length ? s.cupGWs : DEFAULT_CUP_GWS;
  } catch { return DEFAULT_CUP_GWS; }
}

function saveCupGWs(gws) {
  localStorage.setItem('cupSettings', JSON.stringify({ cupGWs: gws }));
}

function openCupSettings() {
  const overlay = el('div', { className: 'settings-overlay' });
  const panel = el('div', { className: 'settings-panel' });
  const closeBtn = el('button', { className: 'settings-close', onClick: () => overlay.remove() }, '×');
  panel.appendChild(closeBtn);
  panel.appendChild(el('h2', {}, 'Cup Settings'));

  // Rules section
  const rulesSection = el('div', { className: 'settings-section' });
  rulesSection.appendChild(el('h3', {}, 'Scoring Rules'));
  const rulesList = el('ul', { className: 'rules-list' });
  [
    ['Starting XI only', "Positions 1–11 from each manager's selected team are counted."],
    ['No captain bonus', 'The 2× captain multiplier is ignored — all players count as ×1.'],
    ['No chip effects', 'Bench Boost is ignored; only the starting XI counts regardless of chip played.'],
    ['Triple captain stripped', 'TC multiplier (3×) is reduced to ×1 like all other players.'],
    ['Tiebreaker — single match', "If scores are level, captain's raw points decide. If still tied, vice-captain's raw points."],
    ['Tiebreaker — group stage', 'Points; then head-to-head record; then total cup points scored.'],
  ].forEach(([term, def]) => {
    rulesList.appendChild(el('li', {}, el('strong', {}, term + ': '), def));
  });
  rulesSection.appendChild(rulesList);
  panel.appendChild(rulesSection);

  // GW editor section
  const gwSection = el('div', { className: 'settings-section' });
  gwSection.appendChild(el('h3', {}, 'Cup Gameweeks'));
  gwSection.appendChild(el('p', { style: 'font-size:0.78rem;color:#64748b;margin-bottom:0.85rem' },
    'Gameweeks used for live cup scoring. Edit any week number directly, or add/remove rows. Saves to this browser.'));

  let currentGWs = [...getCupGWs()].sort((a,b)=>a-b);
  const listContainer = el('div', { className: 'gw-list' });

  const ROUND_LABELS = ['Round 1','Round 2','Round 3','Round 4','Round 5','Semi-Final Leg 1','Semi-Final Leg 2','Final'];

  function renderList() {
    listContainer.innerHTML = '';
    currentGWs.forEach((gw, i) => {
      const label = ROUND_LABELS[i] || `Round ${i+1}`;
      const inp = el('input', { className: 'gw-list-input', type: 'number', min: '1', max: '38', value: String(gw) });
      inp.addEventListener('change', () => {
        const v = parseInt(inp.value);
        if (v >= 1 && v <= 38) { currentGWs[i] = v; inp.value = String(v); }
        else inp.value = String(currentGWs[i]);
      });
      const delBtn = el('button', { className: 'gw-list-del' }, '×');
      delBtn.addEventListener('click', () => { currentGWs.splice(i, 1); renderList(); });
      listContainer.appendChild(el('div', { className: 'gw-list-row' },
        el('span', { className: 'gw-list-label' }, label),
        inp,
        delBtn
      ));
    });
  }
  renderList();
  gwSection.appendChild(listContainer);

  const addInput = el('input', { className: 'gw-new-input', type: 'number', min: '1', max: '38', placeholder: 'GW #' });
  const addBtn = el('button', { className: 'gw-add-btn' }, '+ Add gameweek');
  addBtn.addEventListener('click', () => {
    const v = parseInt(addInput.value);
    if (v >= 1 && v <= 38) { currentGWs.push(v); currentGWs.sort((a,b)=>a-b); renderList(); addInput.value = ''; }
  });
  addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  gwSection.appendChild(el('div', { className: 'gw-add-row' }, addInput, addBtn));
  panel.appendChild(gwSection);

  const savedMsg = el('div', { className: 'settings-saved-msg' }, '✓ Saved — reload Cup tab to apply');
  const saveBtn = el('button', { className: 'settings-save-btn' }, 'Save Settings');
  saveBtn.addEventListener('click', () => {
    saveCupGWs(currentGWs);
    savedMsg.style.display = 'block';
    setTimeout(() => { savedMsg.style.display = 'none'; }, 3000);
  });
  panel.appendChild(saveBtn);
  panel.appendChild(savedMsg);

  overlay.appendChild(panel);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function renderCup(data, liveGW) {
  const heroAnchor = document.getElementById('final-hero-anchor');
  heroAnchor.innerHTML = '';
  heroAnchor.appendChild(buildFinalHero(data.knockout.final, liveGW));

  const app = document.getElementById('app');
  app.innerHTML = '';

  // Final pitch view
  const final = data.knockout.final;
  if (final.team_a && final.team_b && final.team_a.entry_id && final.team_b.entry_id) {
    const pitchSection = el('div', { className: 'final-pitch-section' });
    pitchSection.appendChild(el('div', { className: 'section-title' }, icon('layout-grid'), ' The Final — Squads'));
    const pitchContainer = el('div', { className: 'pitch-loading' }, 'Loading squads…');
    pitchSection.appendChild(pitchContainer);
    app.appendChild(pitchSection);
    buildFinalPitchView(final, liveGW, pitchContainer);
  }

  app.appendChild(el('div', { className: 'section-title' }, icon('shield'), ' Semi-Finals'));
  const semis = el('div', { className: 'semis-grid' });
  data.knockout.semi_finals.forEach(sf => semis.appendChild(buildSFCard(sf, liveGW)));
  app.appendChild(semis);
  app.appendChild(el('div', { className: 'section-title', style: 'margin-top:1rem' }, icon('layout-grid'), ' Group Stage'));
  app.appendChild(el('div', { className: 'groups-grid' },
    buildGroupCard('A', data.groups.A, liveGW),
    buildGroupCard('B', data.groups.B, liveGW)
  ));
  const settingsLink = el('div', { className: 'cup-settings-link' });
  const sl = el('a', { href: '#' }, 'Cup Settings & Rules');
  sl.addEventListener('click', e => { e.preventDefault(); openCupSettings(); });
  settingsLink.appendChild(sl);
  app.appendChild(settingsLink);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

Promise.all([
  fetch('./cup_data.json').then(r => r.json()).catch(() => null),
  fetch('./league_data.json').then(r => r.json()).catch(() => null),
]).then(([cupData, leagueData]) => {
  _cupData = cupData;
  _leagueData = leagueData;

  // Update header meta from whichever data is available
  const meta = (cupData || leagueData || {}).metadata || {};
  if (meta.season)    document.getElementById('season-badge').textContent = meta.season;
  if (meta.last_updated) document.getElementById('last-updated').textContent = `Updated: ${meta.last_updated} · GW${meta.current_gw}`;

  switchTab('league');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}).catch(err => {
  document.getElementById('app').innerHTML = `
    <div class="error-msg">
      <div style="font-size:2rem;margin-bottom:0.5rem;color:var(--gold)"><i data-lucide="alert-triangle"></i></div>
      <div>Could not load data.</div>
      <div style="font-size:0.8rem;margin-top:0.5rem;color:var(--muted)">${err.message}</div>
    </div>`;
});
</script>
