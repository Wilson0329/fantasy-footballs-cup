<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Footballs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --surface2:  #1a2236;
      --border:    #1f2d45;
      --accent:    #00d4aa;
      --accent2:   #6366f1;
      --gold:      #f59e0b;
      --red:       #ef4444;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --win:       #16a34a;
      --lose:      #dc2626;
      --draw:      #ca8a04;
      --pos:       #22c55e;
      --neg:       #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1.5rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(99,102,241,0.25) 0%, transparent 60%);
      pointer-events: none;
    }
    .trophy { margin-bottom: 0.5rem; line-height: 1; }
    /* Lucide icon sizing by context */
    i[data-lucide], i[data-lucide] svg { display: inline-block; }
    .trophy svg { width: 36px; height: 36px; stroke: var(--gold); }
    .tab-btn svg { width: 14px; height: 14px; vertical-align: -2px; margin-right: 5px; }
    .section-title svg { width: 16px; height: 16px; vertical-align: -3px; margin-right: 6px; opacity: 0.7; }
    .stats-card-header h3 svg { width: 15px; height: 15px; vertical-align: -3px; margin-right: 5px; opacity: 0.8; }
    .psd-close svg { width: 14px; height: 14px; vertical-align: -2px; }
    .trophy-pill svg { width: 11px; height: 11px; vertical-align: -1px; margin-right: 2px; }
    .gw-live-badge svg { width: 10px; height: 10px; vertical-align: -1px; margin-right: 3px; fill: #f87171; stroke: none; }
    .site-header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #a5b4fc, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }
    .season-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #a5b4fc;
      font-weight: 500;
    }
    .last-updated { font-size: 0.72rem; color: var(--muted); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 1rem;
      position: relative;
      z-index: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.2px;
      flex-shrink: 0;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Squads toggle per match ── */
    .squads-btn {
      display: flex; align-items: center; gap: 0.3rem;
      background: none; border: none; font-family: 'Inter', sans-serif;
      font-size: 0.68rem; font-weight: 600; color: var(--accent);
      cursor: pointer; padding: 0.2rem 1rem 0.35rem; opacity: 0.8;
    }
    .squads-btn:hover { opacity: 1; }
    .match-pitch-wrap {
      padding: 0.5rem 0.75rem 0.75rem;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    .match-pitch-bg {
      background:
        repeating-linear-gradient(180deg,
          rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 36px,
          transparent 36px, transparent 72px),
        linear-gradient(180deg, #14532d 0%, #166534 50%, #14532d 100%);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.35rem 0.5rem;
      position: relative; overflow: hidden;
    }
    .match-pitch-team-label {
      text-align: center; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.5); padding: 0.2rem 0;
    }
    .match-pitch-row {
      display: flex; justify-content: center; gap: 0.25rem; margin-bottom: 0.25rem;
    }
    .match-pitch-midline {
      border-top: 1px solid rgba(255,255,255,0.18); margin: 0.35rem 0.5rem;
    }
    .mp-player {
      display: flex; flex-direction: column; align-items: center;
      width: 48px; gap: 0.1rem;
    }
    .mp-shirt {
      width: 32px; height: 36px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .mp-kit-img { width: 28px; height: 32px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
    .mp-pts {
      background: rgba(0,0,0,0.65); color: var(--text);
      font-size: 0.6rem; font-weight: 700;
      padding: 0.05rem 0.2rem; border-radius: 3px;
      min-width: 18px; text-align: center;
    }
    .mp-name {
      font-size: 0.52rem; font-weight: 600;
      color: rgba(255,255,255,0.9); text-align: center;
      max-width: 48px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mp-loading { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 1rem 0; }

    /* ── Groups ── */
    .groups-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 900px) { .groups-grid { grid-template-columns: 1fr; } }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .group-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .group-badge {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent2);
      color: white;
      font-weight: 800;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .group-header h2 { font-size: 1rem; font-weight: 700; }

    /* ── Standings Table (cup) ── */
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .standings-table thead th {
      padding: 0.5rem 0.75rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .standings-table thead th:first-child { text-align: left; }
    .standings-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .standings-table tbody tr:last-child { border-bottom: none; }
    .standings-table tbody tr:hover { background: var(--surface2); }
    .standings-table td {
      padding: 0.6rem 0.75rem;
      text-align: center;
      color: var(--text);
    }
    .standings-table td:first-child { text-align: left; }
    .pos-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .pos-num { font-weight: 700; width: 1.2rem; text-align: right; color: var(--muted); }
    .team-name { font-weight: 600; }
    .manager-name { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    .qualified-pill {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 170, 0.3);
      white-space: nowrap;
    }
    .pts-cell { font-weight: 700; font-size: 1rem; color: var(--text); }
    .separator-row td { background: rgba(0,0,0,0.3); padding: 2px 0; }

    /* ── Fixtures ── */
    .fixtures-accordion { border-top: 1px solid var(--border); }
    .round-toggle {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .round-toggle:hover { background: var(--surface2); }
    .round-info { display: flex; align-items: center; gap: 0.5rem; }
    .round-gw {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .chevron { transition: transform 0.2s; color: var(--muted); }
    .chevron.open { transform: rotate(180deg); }
    .round-matches { display: none; }
    .round-matches.open { display: block; }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      gap: 0.5rem;
    }
    .match-row:last-child { border-bottom: none; }
    .match-team { flex: 1; }
    .match-team.home { text-align: right; font-weight: 600; }
    .match-team.away { text-align: left;  font-weight: 600; }
    .match-score {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 80px;
      justify-content: center;
    }
    .score-box {
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 2.2rem;
      text-align: center;
    }
    .score-box.win      { background: rgba(22,163,74,0.2);  color: #4ade80; }
    .score-box.lose     { background: rgba(220,38,38,0.2);  color: #f87171; }
    .score-box.draw     { background: rgba(202,138,4,0.2);  color: #fbbf24; }
    .score-box.upcoming { background: var(--surface2); color: var(--muted); }
    .vs-sep { color: var(--muted); font-size: 0.75rem; }

    /* ── Semi-finals ── */
    .semis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { .semis-grid { grid-template-columns: 1fr; } }
    .sf-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .sf-header {
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent2);
    }
    .sf-matchup {
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: space-between;
    }
    .sf-team { flex: 1; }
    .sf-team-name { font-weight: 700; font-size: 0.9rem; }
    .sf-team-name.winner { color: var(--accent); }
    .sf-manager { font-size: 0.72rem; color: var(--muted); }
    .sf-vs { color: var(--muted); font-size: 0.75rem; font-weight: 600; }
    .sf-agg { display: flex; align-items: center; gap: 0.5rem; justify-content: center; padding: 0.5rem 0; }
    .agg-score { font-size: 1.6rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 8px; }
    .agg-score.winner { background: rgba(0,212,170,0.1); color: var(--accent); }
    .agg-score.loser  { background: rgba(0,0,0,0.3); color: var(--muted); }
    .agg-dash { color: var(--muted); font-size: 1.2rem; }
    .sf-legs { border-top: 1px solid var(--border); }
    .sf-leg {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .sf-leg:last-child { border-bottom: none; }
    .sf-leg-label { color: var(--muted); font-weight: 600; font-size: 0.72rem; }
    .sf-leg-scores { display: flex; align-items: center; gap: 0.5rem; }
    .leg-score { font-weight: 700; font-size: 0.9rem; }
    .leg-score.win  { color: #4ade80; }
    .leg-score.lose { color: #f87171; }
    .sf-winner-banner {
      padding: 0.6rem 1rem;
      background: rgba(0,212,170,0.08);
      border-top: 1px solid rgba(0,212,170,0.2);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    /* ── Final Hero ── */
    .final-hero {
      background: linear-gradient(160deg, #0f0c1a 0%, #1a1035 40%, #0d1a0f 100%);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      padding: 2.5rem 1.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .final-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(245,158,11,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .final-hero-label { text-align: center; font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; opacity: 0.8; }
    .final-hero-gw { text-align: center; font-size: 0.72rem; color: var(--muted); margin-bottom: 2rem; }
    .final-hero-matchup { display: flex; align-items: center; justify-content: center; gap: 1rem; max-width: 700px; margin: 0 auto; }
    .final-hero-team { flex: 1; text-align: center; }
    .final-hero-team-name { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 800; line-height: 1.2; color: var(--text); }
    .final-hero-team-name.winner { color: var(--gold); }
    .final-hero-manager { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
    .final-hero-vs { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; flex-shrink: 0; padding: 0 0.5rem; }
    .final-hero-scores { display: flex; align-items: center; gap: 0.5rem; }
    .final-hero-score { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 800; min-width: 2.5rem; text-align: center; color: var(--muted); }
    .final-hero-score.winner { color: var(--gold); }
    .final-hero-dash { color: var(--muted); font-size: 1.5rem; font-weight: 300; }
    .final-hero-upcoming { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .final-hero-q { font-size: 3rem; font-weight: 800; color: rgba(245,158,11,0.25); }
    .final-hero-upcoming-label { font-size: 0.72rem; font-weight: 600; color: rgba(245,158,11,0.6); letter-spacing: 1px; text-transform: uppercase; }
    .final-hero-banner { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: rgba(245,158,11,0.7); font-weight: 500; }
    .final-hero-banner.champion { font-size: 1rem; font-weight: 700; color: var(--gold); }

    /* ── League table ── */
    .league-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .league-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .league-table thead th {
      padding: 0.6rem 1rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .league-table thead th:nth-child(2) { text-align: left; }
    .league-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .league-table tbody tr:last-child { border-bottom: none; }
    .league-table tbody tr:hover { background: var(--surface2); }
    .league-table td { padding: 0.65rem 1rem; text-align: center; }
    .league-table td:nth-child(2) { text-align: left; }
    .rank-cell { font-weight: 700; color: var(--muted); font-size: 0.9rem; }
    .rank-move { font-size: 0.65rem; font-weight: 700; margin-left: 2px; }
    .rank-move.up   { color: #4ade80; }
    .rank-move.down { color: #f87171; }
    .rank-move.same { color: var(--muted); }
    .league-total { font-weight: 800; font-size: 1.05rem; color: var(--text); }
    .league-gw { font-weight: 600; color: var(--accent); }

    /* ── Stats tables (trade diff + captain pts) ── */
    .stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .stats-card-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .stats-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .stats-card-header h3 { font-size: 0.95rem; font-weight: 700; }
    .stats-card-header p { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .stats-table thead th {
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .stats-table thead th:nth-child(2) { text-align: left; }
    .stats-table tbody tr.summary-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .stats-table tbody tr.summary-row:hover { background: var(--surface2); }
    .stats-table tbody tr.detail-row { border-bottom: 1px solid var(--border); }
    .stats-table tbody tr.detail-row:last-child { border-bottom: none; }
    .stats-table td { padding: 0.6rem 1rem; text-align: center; }
    .stats-table td:nth-child(2) { text-align: left; }

    .net-gain { font-weight: 800; font-size: 1rem; }
    .net-gain.pos { color: #4ade80; }
    .net-gain.neg { color: #f87171; }
    .net-gain.zero { color: var(--muted); }

    .expand-btn {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }
    .expand-btn.open { transform: rotate(180deg); }

    /* GW selector bar */
    .gw-selector-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .gw-live-badge {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(239,68,68,0.3);
      letter-spacing: 0.03em;
    }
    .gw-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* Trade detail panel */
    .detail-panel {
      display: none;
      background: rgba(0,0,0,0.25);
    }
    .detail-panel.open { display: table-row-group; }
    .trade-detail-row td {
      padding: 0.45rem 1rem 0.45rem 2rem;
      font-size: 0.78rem;
      border-bottom: 1px solid rgba(31,45,69,0.5);
      text-align: left;
    }
    .trade-detail-row:last-child td { border-bottom: none; }
    .trade-player-out { color: #f87171; }
    .trade-player-in  { color: #4ade80; }
    .trade-diff { font-weight: 700; }
    .trade-diff.pos { color: #4ade80; }
    .trade-diff.neg { color: #f87171; }
    .trade-gw-label {
      display: inline-block;
      padding: 0.1rem 0.35rem;

    .cap-bonus { font-weight: 700; color: var(--gold); }
    .cap-gw { font-size: 0.68rem; color: var(--muted); font-weight: 600; }
    .tc-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      background: rgba(245,158,11,0.2);

      margin-left: 4px;

    /* Form table */

    .form-bar {
      width: 14px; border-radius: 2px 2px 0 0;
      background: var(--accent); opacity: 0.75;
    }
    .form-avg { font-weight: 700; color: var(--accent); font-size: 0.95rem; }

    /* Bench / hit-rate cells */

    .stat-sub { font-size: 0.72rem; color: var(--muted); }
    .hit-bar-wrap { width: 72px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 5px; }
    .hit-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

    /* Stats team selector */
    .stats-team-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem 0; font-size: 0.8rem; color: var(--muted); }
    .stats-team-select { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.2rem 0.5rem; font-size: 0.8rem; cursor: pointer; }
    .stats-table tr.highlighted { background: rgba(99,102,241,0.12) !important; outline: 1px solid rgba(99,102,241,0.35); }
    .stats-table tr.dimmed { opacity: 0.3; }

    /* Cup settings */
    .cup-settings-link { text-align: center; margin-top: 2rem; padding-bottom: 1rem; }
    .cup-settings-link a { color: var(--muted); font-size: 0.78rem; text-decoration: none; border-bottom: 1px solid transparent; }
    .cup-settings-link a:hover { color: var(--text); border-bottom-color: var(--border); }
    .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 2rem 1rem; }
    .settings-panel { background: #1a2236; border: 1px solid #2d3f5c; border-radius: 14px; padding: 2rem; max-width: 520px; width: 100%; position: relative; margin: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.7); }
    .settings-panel h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: #e2e8f0; }
    .settings-close { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; cursor: pointer; font-size: 1rem; border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .settings-close:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }
    .settings-section { margin-bottom: 1.75rem; }
    .settings-section h3 { font-size: 0.75rem; font-weight: 700; color: #818cf8; margin-bottom: 0.85rem; text-transform: uppercase; letter-spacing: 0.8px; }
    .rules-list { list-style: none; padding: 0; }
    .rules-list li { padding: 0.45rem 0; font-size: 0.82rem; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .rules-list li:last-child { border-bottom: none; }
    .rules-list li strong { color: #e2e8f0; }
    .gw-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
    .gw-list-row { display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.4rem 0.6rem; }
    .gw-list-label { font-size: 0.75rem; color: #64748b; width: 60px; flex-shrink: 0; }
    .gw-list-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #e2e8f0; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.85rem; width: 70px; text-align: center; }
    .gw-list-input:focus { outline: none; border-color: #6366f1; background: rgba(99,102,241,0.1); }
    .gw-list-del { background: none; border: none; color: #64748b; cursor: pointer; padding: 0 4px; font-size: 1rem; line-height: 1; margin-left: auto; }
    .gw-list-del:hover { color: #f87171; }
    .gw-add-row { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .gw-add-btn { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; border-radius: 7px; padding: 0.35rem 0.9rem; font-size: 0.82rem; cursor: pointer; }
    .gw-add-btn:hover { background: rgba(99,102,241,0.25); }
    .gw-new-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #e2e8f0; border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.83rem; width: 80px; }
    .settings-save-btn { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 0.65rem 1.4rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; }
    .settings-save-btn:hover { background: #6366f1; }
    .settings-saved-msg { text-align: center; font-size: 0.78rem; color: #4ade80; margin-top: 0.6rem; display: none; }

    /* ── Champions tab ── */
    .champions-intro {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }
    .honour-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    .honour-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .honour-card.rank-1 { border-color: rgba(245,158,11,0.5); }
    .honour-card.rank-2 { border-color: rgba(148,163,184,0.4); }
    .honour-card.rank-3 { border-color: rgba(180,120,70,0.4); }
    .honour-card-top {
      padding: 1.1rem 1.25rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .honour-rank {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; flex-shrink: 0;
    }
    .honour-rank.r1 { background: rgba(245,158,11,0.2); color: var(--gold); }
    .honour-rank.r2 { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .honour-rank.r3 { background: rgba(180,120,70,0.15); color: #b47846; }
    .honour-rank.r4 { background: rgba(99,102,241,0.12); color: #818cf8; }
    .honour-manager { font-weight: 700; font-size: 0.95rem; }

    .honour-total {

      font-size: 1.4rem;
      font-weight: 800;
      color: var(--muted);

    .honour-total.r1 { color: var(--gold); }
    .honour-trophies {
      padding: 0.6rem 1.25rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      border-top: 1px solid var(--border);
    }
    .trophy-pill {
      display: inline-flex;

      font-size: 0.73rem;
      font-weight: 600;
    }
    .trophy-pill.league {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
    }
    .trophy-pill.cup {
      background: rgba(245,158,11,0.12);
      color: var(--gold);
      border: 1px solid rgba(245,158,11,0.25);
    }

    /* ── Champions sub-tables ── */
    .champions-sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 600px) { .champions-sub-grid { grid-template-columns: 1fr; } }
    .sub-table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .sub-table-header {
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .sub-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .sub-table tr { border-bottom: 1px solid var(--border); }
    .sub-table tr:last-child { border-bottom: none; }
    .sub-table td { padding: 0.55rem 1rem; vertical-align: middle; }
    .sub-rank { color: var(--muted); font-weight: 700; font-size: 0.8rem; width: 1.5rem; }
    .sub-manager { font-weight: 600; }
    .sub-alumni { color: var(--muted); font-size: 0.72rem; font-weight: 400; }
    .sub-count { text-align: right; white-space: nowrap; }

    /* ── History tab ── */
    .history-founder {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .founder-photo-wrap {
      flex-shrink: 0;
      width: 220px;
    }
    .founder-photo-wrap img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .founder-content {
      padding: 1.75rem 1.75rem 1.75rem 0;
      flex: 1;
    }
    .founder-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }
    .founder-name {
      font-size: 1.8rem;

      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
    }
    .founder-title {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .founder-quotes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .founder-quote {
      position: relative;
      padding: 0.85rem 1rem 0.85rem 1.25rem;
      background: rgba(99,102,241,0.07);
      border-left: 3px solid var(--accent2);
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text);
      font-style: italic;
    }
    .founder-quote::before {
      content: '"';
      position: absolute;
      top: -0.1rem;
      left: 0.3rem;
      font-size: 2.5rem;
      color: var(--accent2);
      opacity: 0.3;
      font-style: normal;
      line-height: 1;
    }
    .history-timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .timeline-header {
      padding: 1rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .timeline-row {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      font-size: 0.85rem;
    }
    .timeline-row:last-child { border-bottom: none; }
    .timeline-season {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.78rem;
      min-width: 5.5rem;
    }
    .timeline-winner {
      flex: 1;
      font-weight: 600;
    }
    .timeline-trophy {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      font-weight: 600;
    }
    .timeline-trophy.league {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
    }
    .timeline-trophy.cup {
      background: rgba(245,158,11,0.12);
      color: var(--gold);
    }
    .founder-stats {
      display: flex;
      gap: 0;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .fstat {
      flex: 1;
      padding: 0.85rem 0.5rem;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .fstat:last-child { border-right: none; }
    .fstat-num {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a5b4fc, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fstat-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    @media (max-width: 600px) {
      .history-founder { flex-direction: column; gap: 0; }

      .founder-photo-wrap img { height: 260px; width: 100%; object-position: center 15%; }
      .founder-content { padding: 1.25rem; }
      .founder-name { font-size: 1.4rem; }
      .fstat-num { font-size: 1.2rem; }
    }

    /* ── Pitch view ── */
    .pitch-panel {
      display: none;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    .pitch-panel.open { display: block; }
    .pitch-loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .pitch-wrap {
      padding: 1rem 0.75rem 0.75rem;
    }
    .pitch-gw-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 4px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .pitch-bg {
      background:
        repeating-linear-gradient(180deg,
          rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 40px,
          transparent 40px, transparent 80px),
        linear-gradient(180deg, #14532d 0%, #166534 50%, #14532d 100%);
      border-radius: 10px;
      padding: 0.75rem 0.5rem 0.5rem;
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .pitch-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      pointer-events: none;
    }
    /* Pitch markings inserted via JS */
    .pitch-halfway-line {
      position: absolute;
      top: 50%; left: 5%; right: 5%;
      height: 1px;
      background: rgba(255,255,255,0.2);
      pointer-events: none;
    }
    .pitch-center-circle {
      position: absolute;
      top: 50%; left: 50%;
      width: 70px; height: 70px;
      margin-top: -35px; margin-left: -35px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
    }
    .pitch-center-spot {
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      margin-top: -3px; margin-left: -3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      pointer-events: none;
    }
    .pitch-penalty-box {
      position: absolute;
      left: 20%; right: 20%;
      height: 55px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    .pitch-penalty-box.top { top: 0; border-top: none; border-radius: 0 0 4px 4px; }
    .pitch-penalty-box.bottom { bottom: 0; border-bottom: none; border-radius: 4px 4px 0 0; }
    .pitch-row {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }
    .pitch-row:last-child { margin-bottom: 0; }
    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 58px;
      gap: 0.2rem;
    }
    .player-card:hover .player-shirt { transform: scale(1.08); }
    .player-card.selected .player-shirt { transform: scale(1.1); filter: drop-shadow(0 0 6px rgba(99,102,241,0.7)); }
    .player-card.selected .player-name-txt { color: #a5b4fc; }
    .player-shirt {
      width: 44px; height: 50px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .kit-img { width: 40px; height: 46px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
    .kit-img-fallback { width: 36px; height: 36px; border-radius: 6px; }
    .kit-img-fallback.gkp { background: #92400e; }
    .kit-img-fallback.def { background: #1e3a5f; }
    .kit-img-fallback.mid { background: #1e4d2b; }
    .kit-img-fallback.fwd { background: #7c1d1d; }
    .player-shirt .cap-badge {
      position: absolute;
      top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      color: #000;
      font-size: 0.5rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .player-pts-badge {
      background: rgba(0,0,0,0.6);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      min-width: 22px;
      text-align: center;
    }
    .player-pts-badge.live { color: #4ade80; }
    .player-name-txt {
      font-size: 0.6rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-align: center;
      line-height: 1.2;
      max-width: 58px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bench-section {
      margin-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 0.5rem;
    }
    .bench-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .bench-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
    }
    /* Player stats drawer */
    .player-stats-drawer {
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      margin: 0.75rem 0.5rem 0;
      padding: 0.85rem 1rem;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .psd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .psd-name { font-weight: 700; font-size: 0.9rem; }
    .psd-close { color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 0.25rem; }
    .psd-close:hover { color: var(--text); }
    .psd-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .psd-stat {
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      text-align: center;
    }
    .psd-stat-num { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .psd-stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .psd-history {
      display: flex;
      gap: 0.3rem;
      align-items: flex-end;
      justify-content: center;
    }
    .psd-gw-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .psd-bar {
      width: 28px;
      background: var(--accent2);
      border-radius: 3px 3px 0 0;
      min-height: 3px;
    }
    .psd-bar-pts { font-size: 0.62rem; font-weight: 700; color: var(--text); }
    .psd-bar-gw { font-size: 0.55rem; color: var(--muted); }
    .psd-loading { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 0.5rem; }

    /* ── Pitch split layout ── */
    .pitch-split {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 0.75rem;
    }
    .pitch-left {
      flex: 0 0 auto;
      width: 58%;
      min-width: 0;
    }
    .pitch-right {
      flex: 1 1 0;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      min-height: 200px;
    }
    .pitch-right-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
    .pitch-right-empty svg { opacity: 0.3; width: 28px; height: 28px; }
    @media (max-width: 640px) {
      .pitch-split { flex-direction: column; padding: 0.5rem; gap: 0.75rem; }
      .pitch-left { width: 100%; }
      .pitch-right {
        width: 100%;
        min-height: auto;
        border-top: 1px solid var(--border);
        border-left: none;
      }
      .pitch-right-empty { height: 90px; font-size: 0.75rem; }
      .pitch-right-empty svg { width: 22px; height: 22px; }
      .psd-stats-grid { grid-template-columns: repeat(3, 1fr); }
      .psd-history { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.4rem; }
    }

    /* ── Final match pitch ── */
    .final-pitch-section { margin-bottom: 2rem; }
    .final-pitch-main { width: 100%; }
    .final-pitch-preview-label {
      text-align: center; font-size: 0.7rem; color: var(--muted);
      margin-bottom: 0.4rem; letter-spacing: 0.3px;
    }
    .final-pitch-bg {
      background:
        repeating-linear-gradient(90deg,
          rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 40px,
          transparent 40px, transparent 80px),
        linear-gradient(90deg, #14532d 0%, #166534 50%, #14532d 100%);
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
      display: flex; flex-direction: row; align-items: stretch;
      min-height: 260px;
    }
    .final-pitch-bg::before {
      content: ''; position: absolute; inset: 0;
      border: 2px solid rgba(255,255,255,0.12); border-radius: 9px; pointer-events: none;
    }
    .pitch-half {
      display: flex; flex: 1; flex-direction: column;
    }
    .final-team-label {
      text-align: center; font-size: 0.55rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.4); padding: 0.25rem 0.25rem 0.1rem;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .pitch-cols-row {
      display: flex; flex: 1; align-items: stretch;
    }
    .pitch-col {
      display: flex; flex: 1; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      padding: 0.15rem 0.05rem;
    }
    .pitch-midline {
      width: 1px; background: rgba(255,255,255,0.18);
      flex-shrink: 0; align-self: stretch; margin: 0.5rem 0;
    }
    .mini-player-card {
      display: flex; flex-direction: column; align-items: center;
      width: 56px; gap: 0.12rem; cursor: default;
    }
    .mini-shirt {
      width: 40px; height: 46px; position: relative;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .mini-kit-img { width: 34px; height: 38px; object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7)); }
    .mini-cap-badge {
      position: absolute; top: -3px; right: -3px;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--gold); color: #000; font-size: 0.45rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .mini-pts {
      background: rgba(0,0,0,0.65); color: var(--text);
      font-size: 0.65rem; font-weight: 700;
      padding: 0.05rem 0.3rem; border-radius: 3px;
      min-width: 20px; text-align: center;
    }
    .mini-pts.live { color: #4ade80; }
    .mini-name {
      font-size: 0.57rem; font-weight: 600;
      color: rgba(255,255,255,0.9); text-align: center;
      max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .final-bench-panel {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.6rem 0.75rem; margin: 0.5rem 0;
    }
    .final-bench-header {
      display: flex; align-items: baseline; gap: 0.3rem;
      margin-bottom: 0.4rem; white-space: nowrap; overflow: hidden;
    }
    .final-bench-title {
      font-size: 0.58rem; font-weight: 700; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
    }
    .final-bench-label {
      font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted); flex-shrink: 0;
    }
    .final-bench-players {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
    }
    .final-bench-player {
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      padding: 0.3rem 0.2rem; border: 1px solid var(--border);
      border-radius: 6px; background: var(--surface2);
    }
    .final-bench-shirt { width: 28px; height: 30px; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; }
    .mini-bench-kit { width: 24px; height: 28px; object-fit: contain; }
    .final-bench-info { min-width: 0; width: 100%; text-align: center; }
    .final-bench-name { font-size: 0.58rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
    .final-bench-pts { font-size: 0.55rem; color: var(--muted); text-align: center; }
    .final-bench-pts.live { color: #4ade80; }
    @media (max-width: 640px) {
      .mini-player-card { width: 40px; }
      .mini-name { max-width: 40px; font-size: 0.48rem; }
      /* Final pitch: portrait (top-to-bottom) on mobile */
      .final-pitch-bg { flex-direction: column; min-height: auto; }
      .pitch-half { flex: unset; width: 100%; }
      .pitch-cols-row { flex-direction: column; }
      .pitch-col { flex-direction: row; justify-content: center; gap: 0.1rem; flex: unset; width: 100%; padding: 0.1rem 0; }
      .pitch-midline { width: auto; height: 1px; margin: 0.25rem 0.5rem; }
    }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      .container { padding: 1rem 0.75rem; }
      .site-header { padding: 0.75rem 0.75rem 0; }
      .tab-btn { padding: 0.6rem 0.85rem; font-size: 0.8rem; }

      /* Group standings: hide W/D/L on small screens */
      .standings-table .hide-mobile { display: none; }
      .standings-table td, .standings-table th { padding: 0.5rem 0.4rem; }
      .standings-table { font-size: 0.78rem; }

      /* League table */
      .league-table td, .league-table th { padding: 0.5rem 0.6rem; }

      /* Stats tables: scroll only the table, header stays */
      .stats-table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .stats-table { min-width: 380px; }
      .stats-table td, .stats-table th { padding: 0.5rem 0.5rem; }

      /* Semi-final cards */
      .sf-matchup { gap: 0.4rem; }
      .sf-team-name { font-size: 0.82rem; }
      .agg-score { font-size: 1.2rem; padding: 0.2rem 0.5rem; }

      /* Final hero */
      .final-hero { padding: 1.75rem 1rem 1.5rem; }
      .final-hero-team-name { font-size: 1rem; }
      .final-hero-score { font-size: 2rem; }

      /* Honour board: single column */
      .honour-board { grid-template-columns: 1fr; }
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 3rem 2rem; color: var(--red); }
    .not-available { text-align: center; padding: 3rem 2rem; color: var(--muted); font-size: 0.9rem; }
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="trophy"><i data-lucide="trophy"></i></div>
  <h1>Fantasy Footballs</h1>
  <div class="header-meta">
    <span class="season-badge" id="season-badge">2025/26</span>
    <span class="last-updated" id="last-updated"></span>
  </div>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="league"><i data-lucide="bar-chart-2"></i>League</button>
    <button class="tab-btn" data-tab="stats"><i data-lucide="trending-up"></i>Stats</button>
    <button class="tab-btn" data-tab="cup"><i data-lucide="trophy"></i>Cup</button>
    <button class="tab-btn" data-tab="champions"><i data-lucide="award"></i>Champions</button>
    <button class="tab-btn" data-tab="history"><i data-lucide="book-open"></i>History</button>
  </nav>
</header>

<div id="final-hero-anchor"></div>
<main class="container" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    Loading…
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DOM helper
// ─────────────────────────────────────────────────────────────────────────────

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k === 'onClick') e.addEventListener('click', v);
    else if (k === 'innerHTML') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function scoreClass(score, opp) {
  if (score === null) return 'upcoming';
  if (score > opp) return 'win';
  if (score < opp) return 'lose';
  return 'draw';
}

function fmtDiff(n) {
  return (n >= 0 ? '+' : '') + n;
}

// ─────────────────────────────────────────────────────────────────────────────
// Cup tab builders
// ─────────────────────────────────────────────────────────────────────────────

function buildStandingsTable(standings) {
  const rows = standings.map((s, i) => {
    const posCell = el('div', { className: 'pos-cell' },
      el('span', { className: 'pos-num' }, String(s.position)),
      el('div', {},
        el('div', { className: 'team-name' },
          s.name,
          s.qualified ? el('span', { className: 'qualified-pill', style: 'margin-left:6px' }, 'Q') : null
        ),
        el('div', { className: 'manager-name' }, s.manager)
      )
    );
    return el('tr', {},
      el('td', {}, posCell),
      el('td', {}, String(s.played)),
      el('td', { className: 'hide-mobile' }, String(s.won)),
      el('td', { className: 'hide-mobile' }, String(s.drawn)),
      el('td', { className: 'hide-mobile' }, String(s.lost)),
      el('td', {}, String(s.points_for)),
      el('td', { className: 'pts-cell' }, String(s.cup_points))
    );
  });

  const tbody = el('tbody');
  rows.forEach((tr, i) => {
    tbody.appendChild(tr);
    if (i === 1) {
      tbody.appendChild(el('tr', { className: 'separator-row' },
        el('td', { colspan: '7', style: 'height:3px;background:rgba(0,212,170,0.15)' })
      ));
    }
  });

  return el('table', { className: 'standings-table' },
    el('thead', {}, el('tr', {},
      el('th', { style: 'text-align:left;padding-left:0.75rem' }, 'Team'),
      el('th', {}, 'P'),
      el('th', { className: 'hide-mobile' }, 'W'),
      el('th', { className: 'hide-mobile' }, 'D'),
      el('th', { className: 'hide-mobile' }, 'L'),
      el('th', {}, 'PF'), el('th', {}, 'Pts')
    )),
    tbody
  );
}

async function buildMatchPitch(entryIdA, nameA, entryIdB, nameB, gw, container) {
  try {
    const [bs, picksA, picksB, live] = await Promise.all([
      getBootstrap(),
      getPicks(entryIdA, gw),
      getPicks(entryIdB, gw),
      getLive(gw).catch(() => null),
    ]);

    const playerMap = {};
    bs.elements.forEach(p => { playerMap[p.id] = p; });
    const teamMap = {};
    bs.teams.forEach(t => { teamMap[t.id] = t; });
    const liveMap = {};
    if (live) live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });

    function buildPortraitSide(picks, reversed) {
      const starters = picks.picks.filter(p => p.position <= 11).sort((a, b) => a.position - b.position);
      const groups = { 1: [], 2: [], 3: [], 4: [] };
      starters.forEach(p => {
        const et = playerMap[p.element]?.element_type || 3;
        groups[et].push(p);
      });
      const order = reversed ? [4, 3, 2, 1] : [1, 2, 3, 4];
      const frag = document.createDocumentFragment();
      order.forEach(et => {
        if (!groups[et].length) return;
        const row = el('div', { className: 'match-pitch-row' });
        groups[et].forEach(pick => {
          const pm = playerMap[pick.element];
          const isGK = pm?.element_type === 1;
          const posClass = posTypeClass(pm?.element_type || 3);
          const teamCode = pm && teamMap[pm.team] ? teamMap[pm.team].code : null;
          const shirt = el('div', { className: 'mp-shirt' });
          if (teamCode) {
            const outfieldUrl = `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${teamCode}_1-66.png`;
            const kitUrl = isGK
              ? `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${teamCode}_1_gk-66.png`
              : outfieldUrl;
            const img = el('img', { className: 'mp-kit-img', alt: '', src: kitUrl });
            img.onerror = () => {
              if (isGK && img.src !== outfieldUrl) { img.src = outfieldUrl; return; }
              img.style.display = 'none';
              shirt.appendChild(el('div', { className: `kit-img-fallback ${posClass}`, style: 'width:16px;height:18px' }));
            };
            shirt.appendChild(img);
          } else {
            shirt.appendChild(el('div', { className: `kit-img-fallback ${posClass}`, style: 'width:16px;height:18px' }));
          }
          const pts = liveMap[pick.element] != null ? String(liveMap[pick.element]) : '—';
          row.appendChild(el('div', { className: 'mp-player' },
            shirt,
            el('div', { className: 'mp-pts' }, pts),
            el('div', { className: 'mp-name' }, pm?.web_name || String(pick.element))
          ));
        });
        frag.appendChild(row);
      });
      return frag;
    }

    const pitchBg = el('div', { className: 'match-pitch-bg' });
    pitchBg.appendChild(el('div', { className: 'match-pitch-team-label' }, nameA));
    pitchBg.appendChild(buildPortraitSide(picksA, false));
    pitchBg.appendChild(el('div', { className: 'match-pitch-midline' }));
    pitchBg.appendChild(buildPortraitSide(picksB, true));
    pitchBg.appendChild(el('div', { className: 'match-pitch-team-label' }, nameB));

    container.innerHTML = '';
    container.appendChild(pitchBg);
  } catch (err) {
    container.innerHTML = `<div class="pitch-error">Could not load squads: ${err.message}</div>`;
  }
}

function makeSquadsToggle(entryIdA, nameA, entryIdB, nameB, gw) {
  const wrap = el('div', { className: 'match-pitch-wrap' });
  wrap.style.display = 'none';
  const btn = el('button', { className: 'squads-btn' }, '⚽ Squads');
  let loaded = false;
  btn.addEventListener('click', async () => {
    const opening = wrap.style.display === 'none';
    wrap.style.display = opening ? '' : 'none';
    btn.textContent = opening ? '▲ Hide squads' : '⚽ Squads';
    if (opening && !loaded) {
      loaded = true;
      wrap.innerHTML = '<div class="mp-loading">Loading squads…</div>';
      await buildMatchPitch(entryIdA, nameA, entryIdB, nameB, gw, wrap);
    }
  });
  return { btn, wrap };
}

function buildFixtures(fixtures, liveGW) {
  const accordion = el('div', { className: 'fixtures-accordion' });
  fixtures.forEach((round, ri) => {
    const isLast = ri === fixtures.length - 1;
    const matchesDiv = el('div', { className: 'round-matches' + (isLast ? ' open' : '') });
    const chevron = el('span', { className: 'chevron' + (isLast ? ' open' : '') }, '▾');
    const toggle = el('button', { className: 'round-toggle',
      onClick: () => { const o = matchesDiv.classList.toggle('open'); chevron.classList.toggle('open', o); }
    },
      el('span', { className: 'round-info' }, round.label, el('span', { className: 'round-gw' }, `GW${round.gw}`)),
      chevron
    );
    accordion.appendChild(toggle);
    round.matches.forEach(m => {
      const h = m.home, a = m.away;
      const upcoming = m.status === 'upcoming';
      const isLiveRound = liveGW && round.gw === liveGW;
      const hClass = (upcoming || isLiveRound) ? 'upcoming' : scoreClass(h.score, a.score);
      const aClass = (upcoming || isLiveRound) ? 'upcoming' : scoreClass(a.score, h.score);
      const hWon = hClass === 'win', aWon = aClass === 'win';
      const hScoreEl = el('span', { className: `score-box ${hClass}` });
      const aScoreEl = el('span', { className: `score-box ${aClass}` });
      if (isLiveRound) {
        hScoreEl.setAttribute('data-cup-entry', String(h.entry_id));
        hScoreEl.setAttribute('data-cup-gw', String(liveGW));
        aScoreEl.setAttribute('data-cup-entry', String(a.entry_id));
        aScoreEl.setAttribute('data-cup-gw', String(liveGW));
        hScoreEl.textContent = '…'; aScoreEl.textContent = '…';
      } else {
        hScoreEl.textContent = upcoming ? '—' : String(h.score);
        aScoreEl.textContent = upcoming ? '—' : String(a.score);
      }
      const { btn: squadsBtn, wrap: pitchWrap } = makeSquadsToggle(
        h.entry_id, h.name, a.entry_id, a.name, round.gw
      );
      matchesDiv.appendChild(el('div', { className: 'match-row' },
        el('div', { className: 'match-team home' },
          el('div', { style: `font-weight:${hWon?'700':'500'};color:${hWon?'var(--text)':'var(--muted)'}` }, h.name)
        ),
        el('div', { className: 'match-score' },
          hScoreEl,
          el('span', { className: 'vs-sep' }, isLiveRound ? el('span', { className: 'live-dot' }) : (upcoming ? 'vs' : '-')),
          aScoreEl
        ),
        el('div', { className: 'match-team away' },
          el('div', { style: `font-weight:${aWon?'700':'500'};color:${aWon?'var(--text)':'var(--muted)'}` }, a.name)
        )
      ));
      matchesDiv.appendChild(squadsBtn);
      matchesDiv.appendChild(pitchWrap);
    });
    accordion.appendChild(matchesDiv);
  });
  return accordion;
}

function buildGroupCard(label, group, liveGW) {
  return el('div', { className: 'group-card' },
    el('div', { className: 'group-header' },
      el('div', { className: 'group-badge' }, label),
      el('h2', {}, `Group ${label}`)
    ),
    buildStandingsTable(group.standings),
    buildFixtures(group.fixtures, liveGW)
  );
}

function buildSFCard(sf, liveGW) {
  const ta = sf.team_a, tb = sf.team_b;
  const winner = sf.winner;
  const aWon = winner && winner.entry_id === ta.entry_id;
  const bWon = winner && winner.entry_id === tb.entry_id;
  const allPlayed = sf.legs.every(l => l.status === 'complete');

  const legsDiv = el('div', { className: 'sf-legs' });
  sf.legs.forEach((leg, i) => {
    const isLiveLeg = liveGW && leg.gw === liveGW;
    const upcoming = leg.status !== 'complete' && !isLiveLeg;
    const aC = (upcoming || isLiveLeg) ? '' : (leg.score_a > leg.score_b ? 'win' : leg.score_a < leg.score_b ? 'lose' : '');
    const bC = (upcoming || isLiveLeg) ? '' : (leg.score_b > leg.score_a ? 'win' : leg.score_b < leg.score_a ? 'lose' : '');
    const scoreAEl = el('span', { className: `leg-score ${aC}` });
    const scoreBEl = el('span', { className: `leg-score ${bC}` });
    if (isLiveLeg) {
      scoreAEl.setAttribute('data-cup-entry', String(ta.entry_id));
      scoreAEl.setAttribute('data-cup-gw', String(liveGW));
      scoreBEl.setAttribute('data-cup-entry', String(tb.entry_id));
      scoreBEl.setAttribute('data-cup-gw', String(liveGW));
      scoreAEl.textContent = '…'; scoreBEl.textContent = '…';
    } else {
      scoreAEl.textContent = upcoming ? '—' : String(leg.score_a);
      scoreBEl.textContent = upcoming ? '—' : String(leg.score_b);
    }
    legsDiv.appendChild(el('div', { className: 'sf-leg' },
      el('span', { className: 'sf-leg-label' },
        `Leg ${i+1} · GW${leg.gw}`, isLiveLeg ? el('span', { className: 'live-dot', style: 'margin-left:6px' }) : null
      ),
      el('div', { className: 'sf-leg-scores' },
        scoreAEl,
        el('span', { style: 'color:var(--muted)' }, ' – '),
        scoreBEl
      )
    ));
    const { btn: sfSquadsBtn, wrap: sfPitchWrap } = makeSquadsToggle(
      ta.entry_id, ta.name, tb.entry_id, tb.name, leg.gw
    );
    legsDiv.appendChild(sfSquadsBtn);
    legsDiv.appendChild(sfPitchWrap);
  });

  return el('div', { className: 'sf-card' },
    el('div', { className: 'sf-header' }, sf.label),
    el('div', { className: 'sf-matchup' },
      el('div', { className: 'sf-team', style: 'text-align:right' },
        el('div', { className: `sf-team-name${aWon ? ' winner' : ''}` }, ta.name),
        el('div', { className: 'sf-manager' }, ta.manager)
      ),
      el('span', { className: 'sf-vs' }, 'vs'),
      el('div', { className: 'sf-team' },
        el('div', { className: `sf-team-name${bWon ? ' winner' : ''}` }, tb.name),
        el('div', { className: 'sf-manager' }, tb.manager)
      )
    ),
    allPlayed ? el('div', { className: 'sf-agg' },
      el('span', { className: `agg-score ${aWon ? 'winner' : 'loser'}` }, String(sf.aggregate_a)),
      el('span', { className: 'agg-dash' }, '–'),
      el('span', { className: `agg-score ${bWon ? 'winner' : 'loser'}` }, String(sf.aggregate_b))
    ) : null,
    legsDiv,
    winner ? el('div', { className: 'sf-winner-banner' }, `${winner.name} advance to the Final`) : null
  );
}

function buildFinalHero(final, liveGW) {
  const ta = final.team_a, tb = final.team_b;
  const winner = final.winner;
  const aWon = winner && winner.entry_id === ta.entry_id;
  const bWon = winner && winner.entry_id === tb.entry_id;
  const isLive = liveGW && liveGW === final.gw;
  const upcoming = final.status !== 'complete' && !isLive;

  let vsArea;
  if (isLive) {
    const scoreAEl = el('span', { className: 'final-hero-score' });
    const scoreBEl = el('span', { className: 'final-hero-score' });
    scoreAEl.setAttribute('data-cup-entry', String(ta.entry_id));
    scoreAEl.setAttribute('data-cup-gw', String(liveGW));
    scoreBEl.setAttribute('data-cup-entry', String(tb.entry_id));
    scoreBEl.setAttribute('data-cup-gw', String(liveGW));
    scoreAEl.textContent = '…'; scoreBEl.textContent = '…';
    vsArea = el('div', { className: 'final-hero-scores' },
      scoreAEl, el('span', { className: 'final-hero-dash' }, '–'), scoreBEl
    );
  } else if (upcoming) {
    vsArea = el('div', { className: 'final-hero-scores' },
      el('span', { className: 'final-hero-score' }, '—'),
      el('span', { className: 'final-hero-dash' }, '–'),
      el('span', { className: 'final-hero-score' }, '—')
    );
  } else {
    vsArea = el('div', { className: 'final-hero-scores' },
      el('span', { className: `final-hero-score${aWon ? ' winner' : ''}` }, String(final.score_a)),
      el('span', { className: 'final-hero-dash' }, '–'),
      el('span', { className: `final-hero-score${bWon ? ' winner' : ''}` }, String(final.score_b))
    );
  }

  const banner = isLive
    ? el('div', { className: 'final-hero-banner' }, el('span', { className: 'live-dot' }), ' Live — scores updating every 60s')
    : upcoming
      ? el('div', { className: 'final-hero-banner' }, `Final kicks off Gameweek ${final.gw} — who lifts the trophy?`)
      : winner
        ? el('div', { className: 'final-hero-banner champion' }, `${winner.name} are champions!`)
        : null;

  return el('div', { className: 'final-hero' },
    el('div', { className: 'final-hero-label' }, 'Grand Final'),
    el('div', { className: 'final-hero-gw' }, `Gameweek ${final.gw}`),
    el('div', { className: 'final-hero-matchup' },
      el('div', { className: 'final-hero-team', style: 'text-align:right' },
        el('div', { className: `final-hero-team-name${aWon ? ' winner' : ''}` }, ta.name || 'TBD'),
        el('div', { className: 'final-hero-manager' }, ta.manager || '')
      ),
      el('div', { className: 'final-hero-vs' }, vsArea),
      el('div', { className: 'final-hero-team', style: 'text-align:left' },
        el('div', { className: `final-hero-team-name${bWon ? ' winner' : ''}` }, tb.name || 'TBD'),
        el('div', { className: 'final-hero-manager' }, tb.manager || '')
      )
    ),
    banner
  );
}

async function buildFinalPitchView(final, liveGW, container) {
  const isLiveFinal = liveGW && liveGW === final.gw;
  const isComplete = final.status === 'complete';

  // Choose which GW to fetch picks from
  // If live or complete → use final.gw; otherwise use last completed GW for preview
  let pickGW = final.gw;
  let previewLabel = null;
  if (!isLiveFinal && !isComplete) {
    try {
      const bs = await getBootstrap();
      const lastFinished = bs.events.filter(e => e.finished).pop();
      if (lastFinished && lastFinished.id !== final.gw) {
        pickGW = lastFinished.id;
        previewLabel = `Preview — squads from GW${pickGW}`;
      }
    } catch (_) {}
  }

  try {
    const [bs, picksA, picksB] = await Promise.all([
      getBootstrap(),
      getPicks(final.team_a.entry_id, pickGW),
      getPicks(final.team_b.entry_id, pickGW),
    ]);

    const playerMap = {};
    bs.elements.forEach(p => { playerMap[p.id] = p; });
    const teamMap = {};
    bs.teams.forEach(t => { teamMap[t.id] = t; });

    // If live, seed live points into player elements
    if (isLiveFinal) {
      try {
        const live = await getLive(liveGW);
        if (live) {
          const liveMap = {};
          live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });
          container.querySelectorAll('[data-live-player]').forEach(el => {
            const id = Number(el.dataset.livePlayer);
            if (liveMap[id] != null) el.textContent = String(liveMap[id]);
          });
        }
      } catch (_) {}
    }

    // Build one half of the pitch as vertical columns (GK→FWD for home, FWD→GK for away)
    function buildPitchHalf(picks, side, teamName) {
      const starters = picks.picks.filter(p => p.position <= 11).sort((a, b) => a.position - b.position);
      const groups = { 1: [], 2: [], 3: [], 4: [] };
      starters.forEach(p => {
        const et = playerMap[p.element] ? playerMap[p.element].element_type : 3;
        groups[et].push(p);
      });

      const half = el('div', { className: 'pitch-half' });
      half.appendChild(el('div', { className: 'final-team-label' }, teamName));
      const colsRow = el('div', { className: 'pitch-cols-row' });

      // home: GK | DEF | MID | FWD (left→right, attacking right)
      // away: FWD | MID | DEF | GK (left→right, attacking left)
      const colOrder = side === 'home' ? [1, 2, 3, 4] : [4, 3, 2, 1];
      colOrder.forEach(et => {
        if (!groups[et].length) return;
        const col = el('div', { className: 'pitch-col' });
        groups[et].forEach(pick => {
          const pm = playerMap[pick.element];
          const teamCode = pm && teamMap[pm.team] ? teamMap[pm.team].code : null;
          col.appendChild(buildMiniPlayerCard(pick, pm, teamCode, isLiveFinal, liveGW || final.gw));
        });
        colsRow.appendChild(col);
      });

      half.appendChild(colsRow);
      return half;
    }

    const benchA = picksA.picks.filter(p => p.position > 11).sort((a, b) => a.position - b.position);
    const benchB = picksB.picks.filter(p => p.position > 11).sort((a, b) => a.position - b.position);

    const pitchBg = el('div', { className: 'final-pitch-bg' });
    pitchBg.appendChild(buildPitchHalf(picksA, 'home', final.team_a.name));
    pitchBg.appendChild(el('div', { className: 'pitch-midline' }));
    pitchBg.appendChild(buildPitchHalf(picksB, 'away', final.team_b.name));

    const pitchMain = el('div', { className: 'final-pitch-main' });
    if (previewLabel) pitchMain.appendChild(el('div', { className: 'final-pitch-preview-label' }, previewLabel));
    pitchMain.appendChild(pitchBg);

    container.innerHTML = '';
    container.appendChild(buildBenchPanel(final.team_a.name, benchA, playerMap, teamMap, isLiveFinal, liveGW || final.gw));
    container.appendChild(pitchMain);
    container.appendChild(buildBenchPanel(final.team_b.name, benchB, playerMap, teamMap, isLiveFinal, liveGW || final.gw));

    // If live, update player pts from current live data
    if (isLiveFinal) {
      try {
        const live = await getLive(liveGW);
        if (live) {
          const liveMap = {};
          live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });
          container.querySelectorAll('[data-live-player]').forEach(pEl => {
            const id = Number(pEl.dataset.livePlayer);
            if (liveMap[id] != null) {
              pEl.textContent = String(liveMap[id]);
              pEl.classList.add('live');
            }
          });
        }
      } catch (_) {}
    }

  } catch (err) {
    container.innerHTML = '';
    container.appendChild(el('div', { className: 'pitch-error' }, `Could not load squads: ${err.message}`));
  }
}

const WORKER_URL = 'https://fpl-proxy.josephpwilson3.workers.dev';

function icon(name) {
  const i = document.createElement('i');
  i.setAttribute('data-lucide', name);
  return i;
}
const LEAGUE_ID = 286779;

const _fplCache = {};
let _leagueStandings = null; // live standings from FPL API
let _bootstrap = null;
let _liveData = null;
let _liveGW = null;
let _liveInterval = null;

async function fetchFPL(path) {
  if (_fplCache[path]) return _fplCache[path];
  const url = `${WORKER_URL}/${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`FPL fetch failed: ${res.status}`);
  const data = await res.json();
  _fplCache[path] = data;
  return data;
}

async function getBootstrap() {
  if (_bootstrap) return _bootstrap;
  _bootstrap = await fetchFPL('bootstrap-static/');
  return _bootstrap;
}

async function getLive(gw) {
  // Always bust cache for live endpoint
  const url = `${WORKER_URL}/event/${gw}/live/?t=${Math.floor(Date.now()/60000)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Live fetch failed: ${res.status}`);
  return res.json();
}

async function getPicks(entryId, gw) {
  const key = `entry/${entryId}/event/${gw}/picks/`;
  // Bust cache per minute for picks too
  if (_fplCache[key] && _fplCache[key]._ts > Date.now() - 120000) return _fplCache[key];
  const url = `${WORKER_URL}/${key}?t=${Math.floor(Date.now()/120000)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Picks fetch failed: ${res.status}`);
  const data = await res.json();
  data._ts = Date.now();
  _fplCache[key] = data;
  return data;
}

async function getPlayerHistory(playerId) {
  const key = `element-summary/${playerId}/`;
  if (_fplCache[key]) return _fplCache[key];
  const data = await fetchFPL(key);
  _fplCache[key] = data;
  return data;
}

const _teamHistoryCache = {};
async function getTeamHistory(entryId) {
  if (_teamHistoryCache[entryId]) return _teamHistoryCache[entryId];
  const url = `${WORKER_URL}/entry/${entryId}/history/?t=${Math.floor(Date.now()/3600000)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`History fetch failed: ${res.status}`);
  const data = await res.json();
  _teamHistoryCache[entryId] = data.current || [];
  return _teamHistoryCache[entryId];
}

function updateLastPolled() {
  const span = document.getElementById('last-updated');
  if (!span) return;
  const t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const meta = ((_cupData || _leagueData || {}).metadata || {});
  const base = meta.last_updated ? `Data: ${meta.last_updated} · ` : '';
  span.textContent = `${base}FPL polled ${t}`;
}

async function getLeagueStandings() {
  // Returns map of entry_id -> { event_total, total, rank, last_rank }
  const data = await fetchFPL(`leagues-classic/${LEAGUE_ID}/standings/`);
  const map = {};
  (data.standings.results || []).forEach(r => {
    map[r.entry] = { gw_points: r.event_total, total_points: r.total, rank: r.rank, rank_last: r.last_rank };
  });
  return map;
}

function startLivePoll(gw) {
  if (_liveInterval) return;
  _liveGW = gw;
  _liveInterval = setInterval(async () => {
    try {
      _liveData = await getLive(gw);
      updateLastPolled();
      refreshOpenPitchViews();
      // Refresh league standing scores in table
      try {
        // Bust cache for standings
        delete _fplCache[`leagues-classic/${LEAGUE_ID}/standings/`];
        _leagueStandings = await getLeagueStandings();
        refreshLeagueScores();
      } catch(e2) { /* ignore standings poll error */ }
    } catch (e) { /* silently ignore poll errors */ }
  }, 60000);
}

function stopLivePoll() {
  if (_liveInterval) { clearInterval(_liveInterval); _liveInterval = null; }
}

// ── Cup live scoring ─────────────────────────────────
let _cupLiveInterval = null;
let _cupLiveGW = null;

async function calcCupScore(entryId, gw, liveMap) {
  const picks = await getPicks(entryId, gw);
  return picks.picks
    .filter(p => p.position <= 11)
    .reduce((s, p) => s + (liveMap[p.element] || 0), 0);
}

async function refreshCupLiveScores() {
  if (!_cupLiveGW || !_cupData) return;
  const gw = _cupLiveGW;
  const live = await getLive(gw);
  const liveMap = {};
  live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });

  // Collect all entry IDs visible in current GW's cup fixtures
  const entryIds = new Set();
  document.querySelectorAll(`[data-cup-entry][data-cup-gw="${gw}"]`).forEach(el => {
    entryIds.add(Number(el.dataset.cupEntry));
  });
  if (!entryIds.size) return;

  // Calculate cup scores in parallel
  const scores = {};
  await Promise.all([...entryIds].map(async id => {
    scores[id] = await calcCupScore(id, gw, liveMap);
  }));

  // Update team cup score elements
  document.querySelectorAll(`[data-cup-entry][data-cup-gw="${gw}"]`).forEach(el => {
    const id = Number(el.dataset.cupEntry);
    if (scores[id] != null) {
      el.textContent = String(scores[id]);
      el.classList.add('score-live');
    }
  });

  // Update individual player score elements in the final pitch view
  document.querySelectorAll(`[data-live-player][data-live-gw="${gw}"]`).forEach(el => {
    const pid = Number(el.dataset.livePlayer);
    if (liveMap[pid] != null) {
      el.textContent = String(liveMap[pid]);
      el.classList.add('live');
    }
  });

  updateLastPolled();
}

function startCupLivePoll(gw) {
  if (_cupLiveInterval) return;
  _cupLiveGW = gw;
  _cupLiveInterval = setInterval(refreshCupLiveScores, 60000);
  refreshCupLiveScores(); // immediate first run
}

function stopCupLivePoll() {
  if (_cupLiveInterval) { clearInterval(_cupLiveInterval); _cupLiveInterval = null; _cupLiveGW = null; }
}

const _openPitchRefresh = {};

function refreshOpenPitchViews() {
  Object.values(_openPitchRefresh).forEach(fn => fn());
}

function refreshLeagueScores() {
  if (!_leagueStandings) return;
  document.querySelectorAll('.league-table tbody').forEach(tbody => {
    const row = tbody.querySelector('tr[data-entry]');
    if (!row) return;
    const entryId = Number(row.dataset.entry);
    const live = _leagueStandings[entryId];
    if (!live) return;
    const gwCell = row.querySelector('.league-gw');
    const totalCell = row.querySelector('.league-total');
    if (gwCell) gwCell.textContent = String(live.gw_points);
    if (totalCell) totalCell.textContent = String(live.total_points);
  });
}

async function buildPitchView(entryId, gw, container, isLive) {
  container.innerHTML = '';
  container.appendChild(el('div', { className: 'pitch-loading' }, 'Loading squad...'));

  try {
    const [bs, picks, live] = await Promise.all([
      getBootstrap(),
      getPicks(entryId, gw),
      (_liveData && _liveGW === gw) ? Promise.resolve(_liveData) : getLive(gw),
    ]);

    if (live) { _liveData = live; _liveGW = gw; }

    const playerMap = {};
    bs.elements.forEach(p => { playerMap[p.id] = p; });

    const teamMap = {};
    bs.teams.forEach(t => { teamMap[t.id] = t; });

    const liveMap = {};
    if (live) live.elements.forEach(e => { liveMap[e.id] = e.stats.total_points; });

    const starters = picks.picks.filter(p => p.position <= 11).sort((a, b) => a.position - b.position);
    const bench    = picks.picks.filter(p => p.position > 11).sort((a, b) => a.position - b.position);

    const rows = { 1: [], 2: [], 3: [], 4: [] };
    starters.forEach(p => {
      const et = playerMap[p.element] ? playerMap[p.element].element_type : 3;
      rows[et].push(p);
    });

    const gwLabel = isLive ? el('span', {}, el('span', { className: 'live-dot' }), 'Live GW' + gw) : el('span', {}, 'GW' + gw);
    const totalPts = starters.reduce((s, p) => {
      const raw = liveMap[p.element] || 0;
      const mult = picks.active_chip === 'bboost' ? 1 : (p.multiplier || 1);
      return s + raw * Math.min(mult, 2);
    }, 0);

    // ── Split layout: left = pitch, right = player stats panel ──
    const split = el('div', { className: 'pitch-split' });
    const leftCol = el('div', { className: 'pitch-left' });
    const rightCol = el('div', { className: 'pitch-right' });

    // Default right panel
    function showRightEmpty() {
      rightCol.innerHTML = '';
      rightCol.appendChild(el('div', { className: 'pitch-right-empty' },
        icon('user'),
        el('span', {}, 'Select a player to view stats')
      ));
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    showRightEmpty();

    async function showPlayerStats(pid) {
      const pm = playerMap[pid];
      rightCol.innerHTML = '';
      rightCol.appendChild(el('div', { className: 'psd-header' },
        el('span', { className: 'psd-name' }, pm ? `${pm.web_name}` : String(pid)),
        pm && teamMap[pm.team] ? el('span', { style: 'font-size:0.75rem;color:var(--muted);font-weight:400;margin-left:6px' }, teamMap[pm.team].short_name) : null
      ));
      rightCol.appendChild(el('div', { className: 'psd-loading' }, 'Loading...'));
      try {
        const summary = await getPlayerHistory(pid);
        const history = summary.history || [];
        const seasonTotal = history.reduce((s, h) => s + h.total_points, 0);
        const last5 = history.slice(-5);

        rightCol.querySelector('.psd-loading').remove();

    container.innerHTML = '';
