name: Daily data refresh

on:
  schedule:
    # 07:00 UTC daily — after FPL's overnight bonus/BPS processing
    - cron: '0 7 * * *'
  workflow_dispatch: # manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openai

      - name: Rebuild league data
        run: python3 build_league_data.py --output docs/league_data.json

      - name: Rebuild cup data
        run: python3 build_cup_data.py --output docs/cup_data.json
        continue-on-error: true

      - name: Generate news commentary
        run: python3 build_news_data.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/league_data.json docs/cup_data.json docs/news_data.json
          git add docs/podcast.mp3 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
